<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דרג חדר | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input[type="range"] { accent-color: #3b82f6; cursor: pointer; }
        .star { transition: transform 0.1s; }
        .star:active { transform: scale(1.3); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center border-b border-slate-800">
        <h1 class="text-xl font-bold text-blue-400 italic">איך היה האתגר?</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-widest mt-1">שתף את החוויה שלך</p>
    </header>

    <main class="max-w-md mx-auto px-6 mt-6">
        <form id="review-form" class="space-y-6">
            
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 mr-1">באיזה חדר ביקרת?</label>
                <select id="room-select" required class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none appearance-none shadow-inner">
                    <option value="" disabled selected>טוען רשימת חדרים...</option>
                </select>
            </div>

            <div class="glass p-6 rounded-3xl text-center shadow-xl border-t border-white/5">
                <label class="block text-xs font-bold text-slate-500 mb-4 uppercase">ציון כללי</label>
                <div class="flex justify-center gap-3 text-4xl">
                    <button type="button" onclick="setStar(1)" class="star text-slate-700">⭐</button>
                    <button type="button" onclick="setStar(2)" class="star text-slate-700">⭐</button>
                    <button type="button" onclick="setStar(3)" class="star text-slate-700">⭐</button>
                    <button type="button" onclick="setStar(4)" class="star text-slate-700">⭐</button>
                    <button type="button" onclick="setStar(5)" class="star text-slate-700">⭐</button>
                </div>
                <input type="hidden" id="rating-value" value="0" required>
            </div>

            <div class="space-y-6 bg-slate-800/40 p-6 rounded-3xl border border-slate-800 shadow-inner">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-medium text-slate-300">רמת פחד 🔥</label>
                        <span id="scary-display" class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-xs font-bold border border-red-500/30">5/10</span>
                    </div>
                    <input type="range" id="scary-slider" min="1" max="10" value="5" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-medium text-slate-300">רמה טכנולוגית 🤖</label>
                        <span id="tech-display" class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-xs font-bold border border-purple-500/30">5/10</span>
                    </div>
                    <input type="range" id="tech-slider" min="1" max="10" value="5" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 mr-1">רשמים מהחדר</label>
                <textarea id="comment" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none shadow-inner text-sm" placeholder="איך הייתה התפאורה? המפעיל היה זמין?"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black py-5 rounded-2xl shadow-2xl shadow-blue-900/40 transition-all active:scale-95">
                שלח ביקורת ועדכן דרכון 🚀
            </button>
        </form>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
        <a href="compare.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px]">השוואה</span>
        </a>
        <a href="add-review.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">✍️</span>
            <span class="text-[10px]">דרג חדר</span>
        </a>
        <a href="passport.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🛂</span>
            <span class="text-[10px]">הדרכון</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Sliders logic
        const scaryS = document.getElementById('scary-slider');
        const techS = document.getElementById('tech-slider');
        scaryS.oninput = () => document.getElementById('scary-display').innerText = scaryS.value + "/10";
        techS.oninput = () => document.getElementById('tech-display').innerText = techS.value + "/10";

        // Star Rating logic
        window.setStar = (val) => {
            document.getElementById('rating-value').value = val;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.style.color = i < val ? '#eab308' : '#334155';
            });
        };

        // Fetch rooms from DB to populate dropdown
        async function loadRoomsList() {
            const select = document.getElementById('room-select');
            try {
                const querySnapshot = await getDocs(collection(db, "rooms"));
                select.innerHTML = '<option value="" disabled selected>בחר חדר מהרשימה...</option>';
                querySnapshot.forEach((doc) => {
                    const opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.text = doc.data().name;
                    select.add(opt);
                });
            } catch (err) {
                console.error("Error loading rooms:", err);
            }
        }

        // Submit to Firestore
        document.getElementById('review-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const rating = document.getElementById('rating-value').value;
            
            if (rating == 0) { alert("אנא דרג בכוכבים!"); return; }

            btn.disabled = true;
            btn.innerText = "שולח ביקורת...";

            const reviewData = {
                roomId: document.getElementById('room-select').value,
                rating: parseInt(rating),
                scaryLevel: parseInt(scaryS.value),
                techLevel: parseInt(techS.value),
                comment: document.getElementById('comment').value,
                timestamp: serverTimestamp() // Time for passport ordering
            };

            try {
                await addDoc(collection(db, "reviews"), reviewData);
                alert("הביקורת התקבלה! הדרכון שלך עודכן 🏆");
                window.location.href = "passport.html";
            } catch (error) {
                console.error("Error adding review:", error);
                btn.disabled = false;
                btn.innerText = "נסה שוב";
            }
        };

        loadRoomsList();
    </script>
</body>
</html>
