<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוספת ביקורת | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-md mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-blue-400 italic">דרג את החוויה ✍️</h1>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest">הביקורת שלך עוזרת לאחרים לבחור</p>
        </header>

        <form id="review-form" class="glass p-6 rounded-3xl shadow-2xl border-t border-white/10 space-y-5">
            
            <div>
                <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">בחר חדר</label>
                <select id="room-select" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white">
                    <option value="" disabled selected>טוען חדרים...</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">ציון כללי (1-10)</label>
                <input type="number" id="rating" min="1" max="10" step="0.1" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-yellow-500 text-yellow-500 font-bold text-center text-xl">
            </div>

            <div>
                <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">מה דעתך על החדר?</label>
                <textarea id="comment" rows="3" placeholder="ספר לנו על האווירה, החידות..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                שלח ביקורת עכשיו ✨
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. טעינת רשימת החדרים לתוך ה-Select
        async function loadRoomsToSelect() {
            const select = document.getElementById('room-select');
            const querySnapshot = await getDocs(collection(db, "rooms"));
            select.innerHTML = '<option value="" disabled selected>בחר מהרשימה...</option>';
            querySnapshot.forEach((roomDoc) => {
                select.innerHTML += `<option value="${roomDoc.id}">${roomDoc.data().name}</option>`;
            });
        }

        // 2. שליחת הביקורת ועדכון החדר
        document.getElementById('review-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const roomId = document.getElementById('room-select').value;
            const newRating = parseFloat(document.getElementById('rating').value);
            
            btn.disabled = true;
            btn.innerText = "מעדכן נתונים...";

            try {
                // א. הוספת הביקורת לאוסף ה-Reviews
                await addDoc(collection(db, "reviews"), {
                    roomId: roomId,
                    rating: newRating,
                    comment: document.getElementById('comment').value,
                    date: new Date().toISOString()
                });

                // ב. חישוב מחדש של הציון ועדכון כמות המדרגים
                const roomRef = doc(db, "rooms", roomId);
                const roomSnap = await getDoc(roomRef);
                const roomData = roomSnap.data();

                const currentCount = roomData.reviewCount || 0;
                const currentRating = roomData.rating || 0;

                // נוסחת ממוצע משוקלל חדש
                const newTotalCount = currentCount + 1;
                const updatedRating = ((currentRating * currentCount) + newRating) / newTotalCount;

                await updateDoc(roomRef, {
                    reviewCount: increment(1),
                    rating: updatedRating
                });

                alert("הביקורת התקבלה! תודה על השיתוף.");
                window.location.href = 'index.html';

            } catch (err) {
                console.error(err);
                alert("חלה שגיאה בשליחה. נסה שוב.");
                btn.disabled = false;
                btn.innerText = "שלח ביקורת עכשיו ✨";
            }
        };

        loadRoomsToSelect();
    </script>
</body>
</html>
