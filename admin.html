<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מערכת | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="gray"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: left 0.7rem top 50%; }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-2xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">ניהול חדרים 🛠️</h1>
            <a href="index.html" class="text-xs bg-slate-800 px-3 py-2 rounded-lg hover:bg-slate-700 transition">חזרה לאתר</a>
        </header>
        
        <section class="glass p-6 rounded-3xl mb-10 shadow-2xl border-t border-white/10">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">✨ הוספת חדר חדש</h2>
            <form id="add-room-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">שם החדר</label>
                    <input type="text" id="name" required placeholder="לדוגמה: הקללה של הפרעון" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">עיר</label>
                    <select id="location" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white">
                        <option value="" disabled selected>בחר עיר...</option>
                        <option value="תל אביב">תל אביב</option>
                        <option value="ירושלים">ירושלים</option>
                        <option value="חיפה">חיפה</option>
                        <option value="ראשון לציון">ראשון לציון</option>
                        <option value="פתח תקווה">פתח תקווה</option>
                        <option value="אשדוד">אשדוד</option>
                        <option value="נתניה">נתניה</option>
                        <option value="באר שבע">באר שבע</option>
                        <option value="רמת גן">רמת גן</option>
                        <option value="חולון">חולון</option>
                        <option value="הרצליה">הרצליה</option>
                        <option value="אילת">אילת</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">ציון כללי (1.0 - 5.0)</label>
                    <input type="number" id="rating" step="0.1" min="1" max="5" required placeholder="לדוגמה: 4.8" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-yellow-500 font-bold">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">תיאור קצר</label>
                    <textarea id="description" required rows="2" placeholder="תקציר העלילה או חוויית החדר..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">רמת פחד (1-10)</label>
                    <input type="number" id="scary" min="1" max="10" required placeholder="דירוג אימה" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">רמה טכנולוגית (1-10)</label>
                    <input type="number" id="tech" min="1" max="10" required placeholder="דירוג טכנולוגיה" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1 mr-1">לינק לתמונה</label>
                    <input type="url" id="image" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="הדבק כאן לינק לתמונה (URL)">
                </div>

                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="kids" class="w-5 h-5 rounded bg-slate-700">
                    <label for="kids" class="text-sm text-slate-300">מתאים לילדים?</label>
                </div>
                
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    הוסף חדר למערכת 🚀
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-400">📋 רשימת חדרים קיימת</h2>
            <div id="admin-rooms-list" class="space-y-3">
                <div class="text-center py-10 text-slate-600 italic">טוען חדרים...</div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadAdminRooms() {
            const list = document.getElementById('admin-rooms-list');
            list.innerHTML = '';
            try {
                const querySnapshot = await getDocs(collection(db, "rooms"));
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-600 italic">אין חדרים במערכת</div>';
                    return;
                }
                querySnapshot.forEach((roomDoc) => {
                    const data = roomDoc.data();
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500 animate-fade-in">
                            <div>
                                <h3 class="font-bold text-blue-100">${data.name}</h3>
                                <p class="text-[10px] text-slate-500">${data.location} | ⭐ ${data.rating}</p>
                            </div>
                            <button onclick="deleteRoom('${roomDoc.id}')" class="bg-red-900/30 text-red-400 p-2 rounded-lg hover:bg-red-900/50 text-xs transition">
                                מחק 🗑️
                            </button>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('add-room-form').onsubmit = async (e) => {
            e.preventDefault();
            const newRoom = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                rating: parseFloat(document.getElementById('rating').value),
                description: document.getElementById('description').value,
                scaryLevel: parseInt(document.getElementById('scary').value),
                techLevel: parseInt(document.getElementById('tech').value),
                difficulty: 5, 
                design: 5,
                story: 5,
                image: document.getElementById('image').value,
                kidFriendly: document.getElementById('kids').checked
            };

            try {
                await addDoc(collection(db, "rooms"), newRoom);
                alert("החדר נוסף בהצלחה!");
                e.target.reset();
                loadAdminRooms();
            } catch (err) {
                console.error(err);
                alert("שגיאה בהוספה.");
            }
        };

        window.deleteRoom = async (id) => {
            if (confirm("בטוח שברצונך למחוק?")) {
                try {
                    await deleteDoc(doc(db, "rooms", id));
                    loadAdminRooms();
                } catch (err) { alert("שגיאה במחיקה."); }
            }
        };

        loadAdminRooms();
    </script>
</body>
</html>
