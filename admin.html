<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מערכת | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="gray"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: left 0.7rem top 50%; }
        .edit-mode { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .closed-room { border-right-color: #ef4444 !important; opacity: 0.8; }
    </style>
</head>
<body class="p-6 pb-24 text-right">

    <div class="max-w-2xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">ניהול חדרים 🛠️</h1>
            <a href="index.html" class="text-xs bg-slate-800 px-3 py-2 rounded-lg hover:bg-slate-700 transition text-slate-300">חזרה לאתר</a>
        </header>
        
        <section id="form-container" class="glass p-6 rounded-3xl mb-10 shadow-2xl border-t border-white/10 transition-all">
            <h2 id="form-title" class="text-lg font-bold mb-4 text-blue-400">✨ הוספת חדר חדש</h2>
            <form id="room-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="edit-id">

                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">שם החדר</label>
                    <input type="text" id="name" required placeholder="שם החדר..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">עיר</label>
                    <select id="location" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white">
                        <option value="" disabled selected>בחר עיר...</option>
                        <option value="תל אביב">תל אביב</option><option value="ירושלים">ירושלים</option>
                        <option value="חיפה">חיפה</option><option value="ראשון לציון">ראשון לציון</option>
                        <option value="פתח תקווה">פתח תקווה</option><option value="אשדוד">אשדוד</option>
                        <option value="נתניה">נתניה</option><option value="באר שבע">באר שבע</option>
                        <option value="אילת">אילת</option><option value="בת ים">בת ים</option>
                        <option value="הרצליה">הרצליה</option><option value="בית שמש">בית שמש</option>
                        <option value="נס ציונה">נס ציונה</option><option value="חולון">חולון</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">ציון כללי (1 - 10)</label>
                    <input type="number" id="rating" step="0.1" min="1" max="10" required placeholder="9.5" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-yellow-500 font-bold">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">תיאור קצר</label>
                    <textarea id="description" required rows="2" placeholder="תקציר החדר..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm text-white"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">רמת פחד (1-10)</label>
                    <input type="number" id="scary" min="1" max="10" required placeholder="דירוג פחד" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none text-white">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">רמה טכנולוגית (1-10)</label>
                    <input type="number" id="tech" min="1" max="10" required placeholder="דירוג טכנולוגיה" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none text-white">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] uppercase text-slate-500 mb-1">לינק לתמונה (אופציונלי)</label>
                    <input type="url" id="image" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white" placeholder="https://...">
                </div>

                <div class="flex items-center gap-6 py-2 md:col-span-2">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="kids" class="w-5 h-5 rounded bg-slate-700 border-none cursor-pointer">
                        <label for="kids" class="text-sm text-slate-300 cursor-pointer">מתאים לילדים?</label>
                    </div>
                    <div class="flex items-center gap-2 border-r border-slate-700 pr-6">
                        <input type="checkbox" id="isClosed" class="w-5 h-5 rounded bg-red-900/20 border-red-500 text-red-500 cursor-pointer focus:ring-red-500">
                        <label for="isClosed" class="text-sm text-red-400 font-bold cursor-pointer">החדר סגור? 🔒</label>
                    </div>
                </div>
                
                <div class="md:col-span-2 flex gap-2 mt-4">
                    <button type="submit" id="submit-btn" class="flex-grow bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        הוסף חדר למערכת 🚀
                    </button>
                    <button type="button" id="cancel-edit" onclick="resetForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white px-6 rounded-xl transition-all">
                        ביטול
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-lg font-bold text-slate-400">📋 רשימת חדרים קיימת</h2>
                <div class="relative w-full md:w-1/2">
                    <input type="text" id="search-input" placeholder="חיפוש מהיר ב-DB לפי שם..." class="w-full bg-slate-800/50 border border-slate-700 p-2 pr-10 rounded-xl outline-none focus:border-blue-500 text-sm text-white text-right">
                    <span class="absolute left-3 top-2.5 opacity-50">🔍</span>
                </div>
            </div>
            <div id="admin-rooms-list" class="space-y-3"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, deleteDoc, doc, updateDoc, query, orderBy, startAt, endAt } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentList = []; // נשתמש בזה כדי לשמור את מה שמוצג כרגע
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=800";

        function renderRooms(roomsToRender) {
            const list = document.getElementById('admin-rooms-list');
            list.innerHTML = '';
            currentList = roomsToRender;
            
            if (roomsToRender.length === 0) {
                list.innerHTML = '<div class="text-center py-4 text-slate-600 italic text-sm">לא נמצאו תוצאות בחיפוש...</div>';
                return;
            }

            roomsToRender.forEach((data) => {
                const closedClass = data.isClosed ? 'closed-room' : 'border-blue-500';
                list.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border-r-4 ${closedClass} animate-fade-in relative overflow-hidden">
                        <div>
                            <h3 class="font-bold ${data.isClosed ? 'text-red-400' : 'text-blue-100'}">
                                ${data.name} ${data.isClosed ? '<span class="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded mr-2 uppercase">סגור</span>' : ''}
                            </h3>
                            <p class="text-[10px] text-slate-500">${data.location} | ⭐ ${data.rating}/10</p>
                        </div>
                        <div class="flex gap-2 relative z-10">
                            <button onclick="startEdit('${data.id}')" class="bg-blue-900/30 text-blue-400 p-2 rounded-lg hover:bg-blue-900/50 text-xs transition">ערוך</button>
                            <button onclick="deleteRoom('${data.id}')" class="bg-red-900/30 text-red-400 p-2 rounded-lg hover:bg-red-900/50 text-xs transition">מחק</button>
                        </div>
                    </div>
                `;
            });
        }

        async function loadAdminRooms() {
            const list = document.getElementById('admin-rooms-list');
            list.innerHTML = '<div class="text-center py-4 text-slate-600 italic text-sm">טוען נתונים...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "rooms"));
                const rooms = [];
                querySnapshot.forEach((roomDoc) => {
                    rooms.push({ id: roomDoc.id, ...roomDoc.data() });
                });
                renderRooms(rooms);
            } catch (err) {
                list.innerHTML = '<div class="text-center py-4 text-red-500">שגיאה בטעינת נתונים</div>';
            }
        }

        document.getElementById('search-input').addEventListener('input', async (e) => {
            const searchTerm = e.target.value.trim();
            if (searchTerm === "") {
                loadAdminRooms();
                return;
            }

            try {
                const q = query(
                    collection(db, "rooms"),
                    orderBy("name"),
                    startAt(searchTerm),
                    endAt(searchTerm + '\uf8ff')
                );

                const querySnapshot = await getDocs(q);
                let results = [];
                querySnapshot.forEach((doc) => {
                    results.push({ id: doc.id, ...doc.data() });
                });
                renderRooms(results);
            } catch (error) {
                console.error("Search Error:", error);
            }
        });

        // תיקון פונקציית העריכה - חיפוש בזיכרון או הבאה מה-DB
        window.startEdit = async (id) => {
            let room = currentList.find(r => r.id === id);
            
            // אם החדר לא ברשימה המוצגת כרגע, נביא אותו מה-DB
            if (!room) {
                const docRef = doc(db, "rooms", id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    room = { id: docSnap.id, ...docSnap.data() };
                } else {
                    alert("החדר לא נמצא");
                    return;
                }
            }

            document.getElementById('edit-id').value = room.id;
            document.getElementById('name').value = room.name;
            document.getElementById('location').value = room.location;
            document.getElementById('rating').value = room.rating;
            document.getElementById('description').value = room.description || "";
            document.getElementById('scary').value = room.scaryLevel;
            document.getElementById('tech').value = room.techLevel;
            document.getElementById('image').value = (room.image === DEFAULT_IMAGE) ? "" : room.image;
            document.getElementById('kids').checked = room.kidFriendly;
            document.getElementById('isClosed').checked = room.isClosed || false;

            document.getElementById('form-title').innerText = "✏️ עריכת חדר קיים";
            document.getElementById('form-title').style.color = "#eab308";
            document.getElementById('submit-btn').innerText = "עדכן שינויים ✅";
            document.getElementById('submit-btn').classList.replace('bg-blue-600', 'bg-yellow-600');
            document.getElementById('form-container').classList.add('edit-mode');
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('room-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "✨ הוספת חדר חדש";
            document.getElementById('form-title').style.color = "#60a5fa";
            document.getElementById('submit-btn').innerText = "הוסף חדר למערכת 🚀";
            document.getElementById('submit-btn').classList.replace('bg-yellow-600', 'bg-blue-600');
            document.getElementById('form-container').classList.remove('edit-mode');
            document.getElementById('cancel-edit').classList.add('hidden');
        };

        document.getElementById('room-form').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const roomData = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                rating: parseFloat(document.getElementById('rating').value),
                description: document.getElementById('description').value,
                scaryLevel: parseInt(document.getElementById('scary').value),
                techLevel: parseInt(document.getElementById('tech').value),
                image: document.getElementById('image').value || DEFAULT_IMAGE,
                kidFriendly: document.getElementById('kids').checked,
                isClosed: document.getElementById('isClosed').checked
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, "rooms", editId), roomData);
                    alert("החדר עודכן בהצלחה!");
                } else {
                    await addDoc(collection(db, "rooms"), roomData);
                    alert("החדר נוסף בהצלחה!");
                }
                resetForm();
                loadAdminRooms();
            } catch (err) { alert("שגיאה בפעולה."); }
        };

        window.deleteRoom = async (id) => {
            if (confirm("בטוח שברצונך למחוק?")) {
                await deleteDoc(doc(db, "rooms", id));
                loadAdminRooms();
            }
        };

        // טעינה ראשונית
        loadAdminRooms();
    </script>
</body>
</html>
