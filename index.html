<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Rooms Israel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-loader { width: 50px; height: 50px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .room-card:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">EscapeRooms</h1>
                <p id="rooms-count" class="text-slate-500 font-bold text-sm">מחשב נתונים...</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="filter-kids" onclick="toggleKidsFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🧒 מתאים לילדים</button>
                <button id="filter-active" onclick="toggleActiveFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🔓 פעיל בלבד</button>
                <select id="sort-select" onchange="loadRooms(false)" class="bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-2xl font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="rating-desc">הכי מדורגים</option>
                    <option value="reviews-desc">הכי פופולריים</option>
                    <option value="scary-desc">הכי מפחידים</option>
                    <option value="tech-desc">הכי טכנולוגיים</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rooms-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <div id="loading-more" class="hidden flex justify-center py-10">
        <div class="neon-loader scale-75"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let kidsOnly = false;
        let activeOnly = false;
        let lastVisible = null;
        let isLoading = false;
        let totalRecordsInDB = 0;
        let currentlyDisplayedCount = 0;
        const batchSize = 15;

        async function loadRooms(isNextPage = false) {
            if (isLoading) return;

            const container = document.getElementById('rooms-container');
            const sortSelect = document.getElementById('sort-select');
            const countDisplay = document.getElementById('rooms-count');
            const loaderMore = document.getElementById('loading-more');

            const sortVal = sortSelect.value;
            const sortMap = {
                'rating-desc': 'rating',
                'reviews-desc': 'reviewCount',
                'scary-desc': 'scaryLevel',
                'tech-desc': 'techLevel'
            };
            const sortField = sortMap[sortVal] || "rating";

            isLoading = true;

            if (!isNextPage) {
                // הצגת מצב טעינה ראשוני
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-24">
                        <div class="neon-loader mb-6"></div>
                        <p class="text-blue-400 font-bold tracking-widest text-xs uppercase animate-pulse">מחפש חדרים...</p>
                    </div>`;
                lastVisible = null;
                currentlyDisplayedCount = 0;
                
                // שלב 1: חישוב סך כל החדרים ב-DB לפי הפילטרים הנוכחיים
                try {
                    let countConstraints = [];
                    if (kidsOnly) countConstraints.push(where("kidFriendly", "==", true));
                    if (activeOnly) countConstraints.push(where("isClosed", "==", false));
                    
                    const countQuery = query(collection(db, "rooms"), ...countConstraints);
                    const snapshot = await getCountFromServer(countQuery);
                    totalRecordsInDB = snapshot.data().count;
                    countDisplay.innerText = `נמצאו ${totalRecordsInDB} חדרים פוטנציאליים`;
                } catch (e) {
                    console.error("Error counting:", e);
                }
            } else {
                loaderMore.classList.remove('hidden');
            }

            try {
                // שלב 2: בניית השאילתה להבאת הנתונים עצמם
                let queryConstraints = [orderBy(sortField, "desc")];
                if (kidsOnly) queryConstraints.push(where("kidFriendly", "==", true));
                if (activeOnly) queryConstraints.push(where("isClosed", "==", false));
                
                if (isNextPage && lastVisible) {
                    queryConstraints.push(startAfter(lastVisible));
                }
                
                queryConstraints.push(limit(batchSize));

                const q = query(collection(db, "rooms"), ...queryConstraints);
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty && !isNextPage) {
                    container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 font-bold">לא נמצאו חדרים... 🤷‍♂️</div>';
                    isLoading = false;
                    return;
                }

                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
                
                let roomsHtml = '';
                querySnapshot.forEach((doc) => {
                    const room = doc.data();
                    currentlyDisplayedCount++;
                    const rating = room.rating ? room.rating.toFixed(1) : "0.0";
                    const scaryPercent = (room.scaryLevel || 0) * 10;
                    const techPercent = (room.techLevel || 0) * 10;
                    const image = room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400';

                    roomsHtml += `
                        <div class="room-card glass rounded-[2.5rem] overflow-hidden flex flex-col cursor-pointer shadow-2xl transition-all ${room.isClosed ? 'opacity-60' : ''}" onclick="window.location.href='room.html?id=${doc.id}'">
                            <div class="relative h-48 overflow-hidden">
                                <img src="${image}" class="w-full h-full object-cover" alt="${room.name}">
                                ${room.isClosed ? `<div class="absolute inset-0 bg-black/60 flex items-center justify-center"><span class="bg-red-600 text-white text-xs font-black px-4 py-2 rounded-full">סגור 🔒</span></div>` : ''}
                                <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur-md px-3 py-2 rounded-2xl border border-white/10 flex flex-col items-center">
                                    <span class="text-yellow-400 font-black text-base">⭐ ${rating}</span>
                                    <span class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">(${room.reviewCount || 0})</span>
                                </div>
                                ${room.kidFriendly && !room.isClosed ? `<div class="absolute bottom-4 right-4 bg-green-500/90 text-white text-[9px] font-black px-2 py-1 rounded-lg">מתאים לילדים</div>` : ''}
                            </div>
                            <div class="p-5 flex-grow">
                                <h3 class="text-xl font-black mb-1 text-white/90">${room.name}</h3>
                                <div class="flex items-center gap-1 text-slate-400 text-xs mb-5"><span>📍</span><span>${room.location}</span></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-1.5 uppercase"><span>💀 פחד</span></div>
                                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-red-500 h-full" style="width: ${scaryPercent}%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-1.5 uppercase"><span>🤖 טכנו'</span></div>
                                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-purple-500 h-full" style="width: ${techPercent}%"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });

                if (isNextPage) {
                    container.insertAdjacentHTML('beforeend', roomsHtml);
                } else {
                    container.innerHTML = roomsHtml;
                }
                
                // עדכון הטקסט של המונה (מציג את הכמות שנטענה מתוך הסך הכל)
                countDisplay.innerText = `מציג ${currentlyDisplayedCount} מתוך ${totalRecordsInDB} חדרים`;

            } catch (error) {
                console.error("Firebase Error:", error);
                if (!isNextPage) container.innerHTML = '<div class="col-span-full text-center text-red-400 p-10">שגיאה בטעינה. וודא שקיים אינדקס ב-Firebase.</div>';
            } finally {
                isLoading = false;
                loaderMore.classList.add('hidden');
            }
        }

        window.toggleKidsFilter = () => {
            kidsOnly = !kidsOnly;
            updateBtnStyle('filter-kids', kidsOnly, 'bg-green-600', 'border-green-500');
            loadRooms(false);
        };

        window.toggleActiveFilter = () => {
            activeOnly = !activeOnly;
            updateBtnStyle('filter-active', activeOnly, 'bg-blue-600', 'border-blue-500');
            loadRooms(false);
        };

        window.loadRooms = loadRooms;

        function updateBtnStyle(id, active, activeBg, activeBorder) {
            const btn = document.getElementById(id);
            if (!btn) return;
            if (active) {
                btn.classList.add(activeBg, activeBorder, 'text-white');
                btn.classList.remove('bg-slate-800', 'border-slate-700', 'text-slate-300');
            } else {
                btn.classList.remove(activeBg, activeBorder, 'text-white');
                btn.classList.add('bg-slate-800', 'border-slate-700', 'text-slate-300');
            }
        }

        // גלילה אינסופית
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                // טוען עוד חדרים רק אם לא בטעינה כרגע ויש עוד חדרים ב-DB שטרם נטענו
                if (!isLoading && lastVisible && currentlyDisplayedCount < totalRecordsInDB) {
                    loadRooms(true);
                }
            }
        });

        // טעינה ראשונית
        loadRooms();
    </script>
</body>
</html>
