<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EscapeRooms | מצא את האתגר הבא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .room-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .room-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 border-b border-slate-800 bg-slate-900/90 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-blue-400 italic tracking-tight">EscapeRooms</h1>
            <p id="rooms-count" class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">טוען חדרים...</p>
        </div>
        <div class="flex gap-2">
            <select id="sort-select" onchange="loadRooms()" class="bg-slate-800 border border-slate-700 rounded-xl text-xs p-2.5 outline-none text-slate-300 focus:border-blue-500 transition-all">
                <option value="rating-desc">🏆 המדורגים ביותר</option>
                <option value="reviews-desc">🔥 הפופולריים ביותר</option>
                <option value="scary-desc">💀 הכי מפחידים</option>
                <option value="tech-desc">🤖 הכי טכנולוגיים</option>
            </select>
        </div>
    </header>

    <section class="p-4 bg-slate-900/50 flex gap-3 overflow-x-auto hide-scrollbar border-b border-slate-800">
        <button id="filter-all" onclick="setFilter('all')" class="filter-btn px-5 py-2 rounded-full bg-blue-600 text-white text-xs font-bold whitespace-nowrap transition-all shadow-lg shadow-blue-900/20">הכל</button>
        <button id="filter-scary" onclick="setFilter('scary')" class="filter-btn px-5 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold whitespace-nowrap hover:bg-red-900/20 hover:border-red-500/50 transition-all text-slate-300">💀 מפחיד</button>
        <button id="filter-tech" onclick="setFilter('tech')" class="filter-btn px-5 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold whitespace-nowrap hover:bg-purple-900/20 hover:border-purple-500/50 transition-all text-slate-300">🤖 טכנולוגי</button>
        <button id="filter-kids" onclick="setFilter('kids')" class="filter-btn px-5 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold whitespace-nowrap hover:bg-green-900/20 hover:border-green-500/50 transition-all text-slate-300">👼 לילדים</button>
    </section>

    <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="rooms-container">
        </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">ראשי</span>
        </a>
        <a href="compare.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px] font-bold">השוואה</span>
        </a>
        <a href="add-review.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">✍️</span>
            <span class="text-[10px] font-bold">דירוג</span>
        </a>
        <a href="passport.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">🛂</span>
            <span class="text-[10px] font-bold">דרכון</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentFilter = 'all';

        async function loadRooms() {
            const container = document.getElementById('rooms-container');
            const sortVal = document.getElementById('sort-select').value;
            
            container.innerHTML = '<div class="col-span-full text-center py-20"><div class="animate-spin inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div><p class="text-slate-500 font-medium">סורק חדרים...</p></div>';

            // מפת שדות למיון
            const sortMap = {
                'rating-desc': 'rating',
                'reviews-desc': 'reviewCount',
                'scary-desc': 'scaryLevel',
                'tech-desc': 'techLevel'
            };

            try {
                // אנחנו שולפים את כל החדרים ממוינים לפי הבחירה של המשתמש
                // זה דורש רק אינדקסים בסיסיים (Single Field) שקיימים בדר"כ אוטומטית
                const q = query(collection(db, "rooms"), orderBy(sortMap[sortVal] || "rating", "desc"));
                const querySnapshot = await getDocs(q);
                
                let roomsHtml = '';
                let count = 0;

                querySnapshot.forEach((doc) => {
                    const room = doc.data();
                    const roomId = doc.id;

                    // פילטור בקוד (Client-side filtering) - מונע שגיאות אינדקסים של Firebase
                    if (currentFilter === 'kids' && !room.kidFriendly) return;
                    if (currentFilter === 'scary' && (room.scaryLevel || 0) < 7) return;
                    if (currentFilter === 'tech' && (room.techLevel || 0) < 7) return;

                    count++;
                    const rating = room.rating ? room.rating.toFixed(1) : "0.0";
                    const reviewCount = room.reviewCount || 0;
                    const scaryPercent = (room.scaryLevel || 0) * 10;
                    const techPercent = (room.techLevel || 0) * 10;
                    const image = room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400';

                    roomsHtml += `
                        <div class="room-card glass rounded-[2.5rem] overflow-hidden flex flex-col cursor-pointer shadow-2xl" onclick="window.location.href='room.html?id=${roomId}'">
                            <div class="relative h-48">
                                <img src="${image}" class="w-full h-full object-cover shadow-inner" alt="${room.name}">
                                <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur-md px-3 py-2 rounded-2xl border border-white/10 shadow-xl flex flex-col items-center min-w-[60px]">
                                    <span class="text-yellow-400 font-black text-base">⭐ ${rating}</span>
                                    <span class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">(${reviewCount} מדרגים)</span>
                                </div>
                                ${room.kidFriendly ? `<div class="absolute bottom-4 right-4 bg-green-500/90 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase shadow-lg">מתאים לילדים</div>` : ''}
                            </div>
                            <div class="p-5 flex-grow">
                                <h3 class="text-xl font-black mb-1 text-white/90">${room.name}</h3>
                                <div class="flex items-center gap-1 text-slate-400 text-xs mb-5">
                                    <span>📍</span><span>${room.location}</span>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-1.5">
                                            <span>💀 פחד</span><span class="text-slate-300">${room.scaryLevel}/10</span>
                                        </div>
                                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                            <div class="bg-red-500 h-full rounded-full" style="width: ${scaryPercent}%"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-1.5">
                                            <span>🤖 טכנו'</span><span class="text-slate-300">${room.techLevel}/10</span>
                                        </div>
                                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                            <div class="bg-purple-500 h-full rounded-full" style="width: ${techPercent}%"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });

                container.innerHTML = roomsHtml || '<div class="col-span-full text-center py-20 text-slate-500">לא נמצאו חדרים בסינון הזה... 🤷‍♂️</div>';
                document.getElementById('rooms-count').innerText = `${count} חדרים נמצאו`;

            } catch (error) {
                console.error("Error loading rooms:", error);
                container.innerHTML = '<div class="col-span-full text-center text-red-400 p-10">שגיאה בטעינת הנתונים.</div>';
            }
        }

        window.setFilter = (filter) => {
            currentFilter = filter;
            // עדכון ויזואלי של הכפתורים
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn px-5 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold whitespace-nowrap transition-all text-slate-300";
            });
            
            const activeBtn = document.getElementById(`filter-${filter}`);
            activeBtn.className = "filter-btn px-5 py-2 rounded-full bg-blue-600 text-white text-xs font-bold whitespace-nowrap transition-all shadow-lg shadow-blue-900/20";
            
            loadRooms();
        };

        window.loadRooms = loadRooms;
        loadRooms();
    </script>
</body>
</html>
