    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
        authDomain: "escisr.firebaseapp.com",
        projectId: "escisr",
        storageBucket: "escisr.firebasestorage.app",
        messagingSenderId: "907984583225",
        appId: "1:907984583225:web:66777e44fb162f68c3abe8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let kidsOnly = false;
    let activeOnly = false;
    let lastVisible = null;
    let isLoading = false;
    let totalLoadedCount = 0;
    const batchSize = 15; // נשאר על 15 לביצועים מקסימליים

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
        authDomain: "escisr.firebaseapp.com",
        projectId: "escisr",
        storageBucket: "escisr.firebasestorage.app",
        messagingSenderId: "907984583225",
        appId: "1:907984583225:web:66777e44fb162f68c3abe8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let kidsOnly = false;
    let activeOnly = false;
    let lastVisible = null;
    let isLoading = false;
    let totalLoadedCount = 0;
    const batchSize = 15;

    async function loadRooms(isNextPage = false) {
        if (isLoading) return;

        const container = document.getElementById('rooms-container');
        const sortSelect = document.getElementById('sort-select');
        if (!container || !sortSelect) return;

        const sortVal = sortSelect.value;
        isLoading = true;

        if (!isNextPage) {
            container.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-24">
                    <div class="neon-loader mb-6"></div>
                    <p class="text-blue-400 font-bold tracking-widest text-xs uppercase animate-pulse">Scanning for rooms...</p>
                </div>`;
            lastVisible = null;
            totalLoadedCount = 0;
        }

        const sortMap = {
            'rating-desc': 'rating',
            'reviews-desc': 'reviewCount',
            'scary-desc': 'scaryLevel',
            'tech-desc': 'techLevel'
        };

        try {
            const sortField = sortMap[sortVal] || "rating";
            let queryConstraints = [orderBy(sortField, "desc")];

            if (kidsOnly) queryConstraints.push(where("kidFriendly", "==", true));
            if (activeOnly) queryConstraints.push(where("isClosed", "==", false));
            if (isNextPage && lastVisible) queryConstraints.push(startAfter(lastVisible));
            
            queryConstraints.push(limit(batchSize));

            const q = query(collection(db, "rooms"), ...queryConstraints);
            const querySnapshot = await getDocs(q);
            
            lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
            
            let roomsHtml = '';
            querySnapshot.forEach((doc) => {
                const room = doc.data();
                totalLoadedCount++;
                const rating = room.rating ? room.rating.toFixed(1) : "0.0";
                const scaryPercent = (room.scaryLevel || 0) * 10;
                const techPercent = (room.techLevel || 0) * 10;
                const image = room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400';

                roomsHtml += `
                    <div class="room-card glass rounded-[2.5rem] overflow-hidden flex flex-col cursor-pointer shadow-2xl ${room.isClosed ? 'room-closed' : ''}" onclick="window.location.href='room.html?id=${doc.id}'">
                        <div class="relative h-48 overflow-hidden">
                            <img src="${image}" class="w-full h-full object-cover shadow-inner" alt="${room.name}">
                            ${room.isClosed ? `<div class="absolute inset-0 closed-overlay flex items-center justify-center"><span class="bg-red-600 text-white text-xs font-black px-4 py-2 rounded-full shadow-2xl border border-red-400 uppercase tracking-tighter">סגור 🔒</span></div>` : ''}
                            <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur-md px-3 py-2 rounded-2xl border border-white/10 shadow-xl flex flex-col items-center min-w-[60px]">
                                <span class="text-yellow-400 font-black text-base">⭐ ${rating}</span>
                                <span class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">(${room.reviewCount || 0} מדרגים)</span>
                            </div>
                            ${room.kidFriendly && !room.isClosed ? `<div class="absolute bottom-4 right-4 bg-green-500/90 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase shadow-lg border border-green-400/50">מתאים לילדים</div>` : ''}
                        </div>
                        <div class="p-5 flex-grow ${room.isClosed ? 'opacity-60' : ''}">
                            <h3 class="text-xl font-black mb-1 text-white/90">${room.name}</h3>
                            <div class="flex items-center gap-1 text-slate-400 text-xs mb-5"><span>📍</span><span>${room.location}</span></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-1.5"><span>💀 פחד</span><span class="text-slate-300">${room.scaryLevel || 0}/10</span></div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-red-500 h-full rounded-full transition-all duration-1000" style="width: ${scaryPercent}%"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-1.5"><span>🤖 טכנו'</span><span class="text-slate-300">${room.techLevel || 0}/10</span></div>
                                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-purple-500 h-full rounded-full transition-all duration-1000" style="width: ${techPercent}%"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            if (isNextPage) {
                container.insertAdjacentHTML('beforeend', roomsHtml);
            } else {
                container.innerHTML = roomsHtml || '<div class="col-span-full text-center py-20 text-slate-500 font-bold">לא נמצאו חדרים התואמים לסינון... 🤷‍♂️</div>';
            }
            
            const countDisplay = document.getElementById('rooms-count');
            if (countDisplay) countDisplay.innerText = `${totalLoadedCount} חדרים נמצאו`;

        } catch (error) {
            console.error("Error loading rooms:", error);
            if (!isNextPage) container.innerHTML = '<div class="col-span-full text-center text-red-400 p-10">שגיאה בטעינת הנתונים.</div>';
        } finally {
            isLoading = false;
        }
    }

    window.toggleKidsFilter = () => {
        kidsOnly = !kidsOnly;
        updateBtnStyle('filter-kids', kidsOnly, 'bg-green-600', 'border-green-500');
        loadRooms(false);
    };

    window.toggleActiveFilter = () => {
        activeOnly = !activeOnly;
        updateBtnStyle('filter-active', activeOnly, 'bg-blue-600', 'border-blue-500');
        loadRooms(false);
    };

    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (!isLoading && lastVisible) loadRooms(true);
        }
    });

    function updateBtnStyle(id, active, activeBg, activeBorder) {
        const btn = document.getElementById(id);
        if (!btn) return;
        if (active) {
            btn.classList.replace('bg-slate-800', activeBg);
            btn.classList.replace('border-slate-700', activeBorder);
            btn.classList.replace('text-slate-300', 'text-white');
            btn.classList.add('shadow-lg', 'shadow-white/5');
        } else {
            btn.classList.replace(activeBg, 'bg-slate-800');
            btn.classList.replace(activeBorder, 'border-slate-700');
            btn.classList.replace('text-white', 'text-slate-300');
            btn.classList.remove('shadow-lg', 'shadow-white/5');
        }
    }

    // התיקון הקריטי: מחכים לטעינת ה-DOM
    window.loadRooms = loadRooms;
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => loadRooms());
    } else {
        loadRooms();
    }
</script>
