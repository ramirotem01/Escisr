<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Rooms Israel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .room-card:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">EscapeRooms</h1>
                <p id="rooms-count" class="text-slate-500 font-bold text-sm italic">מחשב נתונים...</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="filter-kids" onclick="toggleKidsFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🧒 מתאים לילדים</button>
                <button id="filter-active" onclick="toggleActiveFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🔓 פעיל בלבד</button>
                <select id="sort-select" onchange="loadRooms(false)" class="bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-2xl font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="rating-desc">הכי מדורגים</option>
                    <option value="reviews-desc">הכי פופולריים</option>
                    <option value="scary-desc">הכי מפחידים</option>
                    <option value="tech-desc">הכי טכנולוגיים</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rooms-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <div id="scroll-anchor" class="h-20 flex items-center justify-center mt-10">
        <div id="footer-loader" class="neon-loader hidden"></div>
        <p id="end-message" class="text-slate-600 font-bold hidden">זהו, הגעת לסוף הרשימה ✨</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let kidsOnly = false;
        let activeOnly = false;
        let lastVisible = null;
        let isLoading = false;
        let totalCount = 0;
        let loadedSoFar = 0;
        const batchSize = 15;

        // טעינת חדרים
        async function loadRooms(isNextPage = false) {
            if (isLoading) return;
            isLoading = true;

            const container = document.getElementById('rooms-container');
            const countDisplay = document.getElementById('rooms-count');
            const footerLoader = document.getElementById('footer-loader');
            const endMessage = document.getElementById('end-message');
            const sortVal = document.getElementById('sort-select').value;

            const sortMap = { 'rating-desc': 'rating', 'reviews-desc': 'reviewCount', 'scary-desc': 'scaryLevel', 'tech-desc': 'techLevel' };
            const sortField = sortMap[sortVal] || "rating";

            if (!isNextPage) {
                container.innerHTML = '<div class="col-span-full text-center py-20 animate-pulse text-blue-400">טוען...</div>';
                lastVisible = null;
                loadedSoFar = 0;
                endMessage.classList.add('hidden');

                // שליפת כמות כוללת בלבד (לא טוען את האובייקטים!)
                const countConstraints = [];
                if (kidsOnly) countConstraints.push(where("kidFriendly", "==", true));
                if (activeOnly) countConstraints.push(where("isClosed", "==", false));
                
                const qCount = query(collection(db, "rooms"), ...countConstraints);
                const countSnapshot = await getCountFromServer(qCount);
                totalCount = countSnapshot.data().count;
                countDisplay.innerText = `נמצאו ${totalCount} חדרים`;
            } else {
                footerLoader.classList.remove('hidden');
            }

            try {
                // שליפת הנתונים בפועל (רק 15 בכל פעם)
                let queryConstraints = [orderBy(sortField, "desc")];
                if (kidsOnly) queryConstraints.push(where("kidFriendly", "==", true));
                if (activeOnly) queryConstraints.push(where("isClosed", "==", false));
                if (isNextPage && lastVisible) queryConstraints.push(startAfter(lastVisible));
                queryConstraints.push(limit(batchSize));

                const q = query(collection(db, "rooms"), ...queryConstraints);
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty && !isNextPage) {
                    container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500">אין חדרים התואמים לחיפוש.</div>';
                    isLoading = false;
                    return;
                }

                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
                let roomsHtml = '';

                querySnapshot.forEach((doc) => {
                    const room = doc.data();
                    loadedSoFar++;
                    roomsHtml += renderRoomCard(doc.id, room);
                });

                if (isNextPage) {
                    container.insertAdjacentHTML('beforeend', roomsHtml);
                } else {
                    container.innerHTML = roomsHtml;
                }

                // עדכון מונה ללא טעינת כל הנתונים
                countDisplay.innerText = `מציג ${loadedSoFar} מתוך ${totalCount} חדרים`;

                if (loadedSoFar >= totalCount) {
                    endMessage.classList.remove('hidden');
                }

            } catch (error) {
                console.error("Error:", error);
            } finally {
                isLoading = false;
                footerLoader.classList.add('hidden');
            }
        }

        function renderRoomCard(id, room) {
            const rating = room.rating ? room.rating.toFixed(1) : "0.0";
            const image = room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400';
            return `
                <div class="room-card glass rounded-[2.5rem] overflow-hidden flex flex-col cursor-pointer ${room.isClosed ? 'opacity-60' : ''}" onclick="window.location.href='room.html?id=${id}'">
                    <div class="relative h-48">
                        <img src="${image}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-xl text-yellow-400 font-bold">⭐ ${rating}</div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-xl font-black">${room.name}</h3>
                        <p class="text-slate-400 text-sm italic">📍 ${room.location}</p>
                    </div>
                </div>`;
        }

        // ניהול פילטרים - קריאה חדשה ל-DB בכל שינוי
        window.toggleKidsFilter = () => { kidsOnly = !kidsOnly; updateUI('filter-kids', kidsOnly); loadRooms(false); };
        window.toggleActiveFilter = () => { activeOnly = !activeOnly; updateUI('filter-active', activeOnly); loadRooms(false); };
        window.loadRooms = loadRooms;

        function updateUI(id, active) {
            const btn = document.getElementById(id);
            if (active) {
                btn.classList.replace('bg-slate-800', 'bg-blue-600');
                btn.classList.add('text-white');
            } else {
                btn.classList.replace('bg-blue-600', 'bg-slate-800');
                btn.classList.remove('text-white');
            }
        }

        // גילוי גלילה (Infinite Scroll)
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (!isLoading && loadedSoFar < totalCount) loadRooms(true);
            }
        };

        loadRooms();
    </script>
</body>
</html>
