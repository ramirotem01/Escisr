<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Rooms Israel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .room-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">EscapeRooms</h1>
                <p id="rooms-count-header" class="text-slate-500 font-bold text-sm tracking-wide">בודק כמה חדרים יש במערכת...</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="filter-kids" onclick="toggleKidsFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🧒 לילדים</button>
                <button id="filter-active" onclick="toggleActiveFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all hover:bg-slate-700">🔓 פעיל בלבד</button>
                <select id="sort-select" onchange="loadRooms(false)" class="bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-2xl font-bold outline-none cursor-pointer">
                    <option value="rating">הכי מדורגים</option>
                    <option value="reviewCount">הכי פופולריים</option>
                    <option value="scaryLevel">הכי מפחידים</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rooms-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20"></div>

    <script type="module">
        // הוספנו את getCountFromServer ל-imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let kidsOnly = false;
        let activeOnly = false;
        let lastVisible = null;
        let isLoading = false;
        const batchSize = 15;

        // --- 1. פונקציה חדשה שמביאה את הסה"כ האמיתי מהשרת ---
        async function updateTotalCount() {
            try {
                const coll = collection(db, "rooms");
                // אפשר להוסיף כאן 'where' אם רוצים שהספירה תתעדכן לפי הפילטרים
                let q = query(coll);
                if (kidsOnly) q = query(coll, where("kidFriendly", "==", true));
                if (activeOnly) q = query(q, where("isClosed", "==", false));

                const snapshot = await getCountFromServer(q);
                const total = snapshot.data().count;
                document.getElementById('rooms-count-header').innerText = `נמצאו ${total} חדרים התואמים לחיפוש שלך`;
            } catch (e) {
                console.error("Count error:", e);
            }
        }

        async function loadRooms(isNextPage = false) {
            if (isLoading) return;
            isLoading = true;

            const container = document.getElementById('rooms-container');
            const sortField = document.getElementById('sort-select').value;

            if (!isNextPage) {
                container.innerHTML = '<div class="col-span-full flex justify-center py-20"><div class="neon-loader"></div></div>';
                lastVisible = null;
                // בכל פעם שמשנים פילטר, נעדכן גם את הספירה הכללית ב-Header
                updateTotalCount();
            }

            try {
                let constraints = [];
                if (kidsOnly) constraints.push(where("kidFriendly", "==", true));
                if (activeOnly) constraints.push(where("isClosed", "==", false));
                constraints.push(orderBy(sortField, "desc"));
                
                if (isNextPage && lastVisible) constraints.push(startAfter(lastVisible));
                constraints.push(limit(batchSize));

                const q = query(collection(db, "rooms"), ...constraints);
                const querySnapshot = await getDocs(q);
                
                if (!isNextPage) container.innerHTML = ''; 

                querySnapshot.forEach((doc) => {
                    const room = doc.data();
                    container.insertAdjacentHTML('beforeend', renderRoomCard(doc.id, room));
                });

                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];

            } catch (error) {
                console.error("Error:", error);
                if (error.message.includes("index")) {
                    container.innerHTML = '<div class="col-span-full p-4 bg-red-900/20 text-red-200 rounded-xl text-center">חסר אינדקס ב-Firebase. בדוק את ה-Console לקישור ליצירה.</div>';
                }
            } finally {
                isLoading = false;
            }
        }

        function renderRoomCard(id, room) {
            const rating = (room.rating || 0).toFixed(1);
            const image = room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400';
            return `
                <div class="room-card glass rounded-[2rem] overflow-hidden flex flex-col shadow-2xl cursor-pointer" onclick="window.location.href='room.html?id=${id}'">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${image}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10 text-yellow-400 font-bold">⭐ ${rating}</div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-xl font-bold mb-1">${room.name}</h3>
                        <p class="text-slate-400 text-xs mb-4">📍 ${room.location}</p>
                        <div class="flex gap-2">
                             ${room.kidFriendly ? '<span class="bg-green-500/20 text-green-400 text-[10px] px-2 py-1 rounded-md border border-green-500/30">ילדים</span>' : ''}
                             ${!room.isClosed ? '<span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-md border border-blue-500/30">פעיל</span>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        window.toggleKidsFilter = () => {
            kidsOnly = !kidsOnly;
            document.getElementById('filter-kids').classList.toggle('bg-green-600');
            loadRooms(false);
        };

        window.toggleActiveFilter = () => {
            activeOnly = !activeOnly;
            document.getElementById('filter-active').classList.toggle('bg-blue-600');
            loadRooms(false);
        };

        window.loadRooms = loadRooms;

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if (!isLoading && lastVisible) loadRooms(true);
            }
        });

        // הרצה ראשונית
        loadRooms();
        updateTotalCount();
    </script>
</body>
</html>
