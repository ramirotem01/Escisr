<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Rooms Israel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-loader { width: 50px; height: 50px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">EscapeRooms</h1>
                <p id="rooms-count" class="text-slate-500 font-bold text-sm">טוען חדרים...</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="filter-kids" onclick="toggleKidsFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all">🧒 מתאים לילדים</button>
                <button id="filter-active" onclick="toggleActiveFilter()" class="bg-slate-800 border border-slate-700 text-slate-300 px-6 py-3 rounded-2xl font-bold transition-all">🔓 פעיל בלבד</button>
                <select id="sort-select" onchange="resetAndLoad()" class="bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-2xl font-bold outline-none">
                    <option value="rating">הכי מדורגים</option>
                    <option value="reviewCount">הכי פופולריים</option>
                    <option value="scaryLevel">הכי מפחידים</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rooms-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let kidsOnly = false;
        let activeOnly = false;
        let lastVisible = null;
        let isLoading = false;
        let currentTotal = 0;
        const batchSize = 15;

        async function loadRooms(isNextPage = false) {
            if (isLoading) return;
            isLoading = true;

            const container = document.getElementById('rooms-container');
            const sortField = document.getElementById('sort-select').value;

            if (!isNextPage) {
                container.innerHTML = '<div class="col-span-full flex justify-center py-20"><div class="neon-loader"></div></div>';
                lastVisible = null;
                currentTotal = 0;
            }

            try {
                // בניית השאילתה - כאן קורה הקסם
                let constraints = [];

                // 1. קודם כל הפילטרים (where)
                if (kidsOnly) constraints.push(where("kidFriendly", "==", true));
                if (activeOnly) constraints.push(where("isClosed", "==", false));

                // 2. אחר כך המיון (orderBy)
                constraints.push(orderBy(sortField, "desc"));

                // 3. דפינציה (Pagination)
                if (isNextPage && lastVisible) constraints.push(startAfter(lastVisible));
                
                constraints.push(limit(batchSize));

                const q = query(collection(db, "rooms"), ...constraints);
                const querySnapshot = await getDocs(q);
                
                if (!isNextPage) container.innerHTML = ''; // מנקים את הלואודר

                if (querySnapshot.empty && !isNextPage) {
                    container.innerHTML = '<p class="col-span-full text-center text-slate-500">לא נמצאו חדרים כאלו בשרת...</p>';
                }

                querySnapshot.forEach((doc) => {
                    const room = doc.data();
                    currentTotal++;
                    container.insertAdjacentHTML('beforeend', renderRoomCard(doc.id, room));
                });

                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
                document.getElementById('rooms-count').innerText = `${currentTotal} חדרים נטענו (מתוך כלל המערכת)`;

            } catch (error) {
                console.error("Error:", error);
                // הודעה חשובה למפתח
                if (error.message.includes("index")) {
                    container.innerHTML = `<div class="col-span-full p-4 bg-red-900/20 border border-red-500 rounded-xl text-red-200 text-sm">
                        <b>חסר אינדקס ב-Firebase!</b><br>
                        פתח את ה-Console בדפדפן (F12), תראה לינק כחול בתוך השגיאה. תלחץ עליו כדי לאשר ל-Firebase ליצור את האינדקס הזה.
                    </div>`;
                }
            } finally {
                isLoading = false;
            }
        }

        function renderRoomCard(id, room) {
            const rating = (room.rating || 0).toFixed(1);
            return `
                <div class="room-card glass rounded-[2rem] overflow-hidden flex flex-col shadow-2xl" onclick="window.location.href='room.html?id=${id}'">
                    <img src="${room.image || 'https://via.placeholder.com/400'}" class="h-48 w-full object-cover">
                    <div class="p-5">
                        <h3 class="text-xl font-bold text-white">${room.name}</h3>
                        <p class="text-slate-400 text-sm mb-4">📍 ${room.location}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-yellow-400 font-bold">⭐ ${rating}</span>
                            ${room.kidFriendly ? '<span class="text-green-400 text-xs font-bold bg-green-400/10 px-2 py-1 rounded">לילדים</span>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        window.toggleKidsFilter = () => {
            kidsOnly = !kidsOnly;
            document.getElementById('filter-kids').classList.toggle('bg-green-600');
            loadRooms(false);
        };

        window.toggleActiveFilter = () => {
            activeOnly = !activeOnly;
            document.getElementById('filter-active').classList.toggle('bg-blue-600');
            loadRooms(false);
        };

        window.resetAndLoad = () => loadRooms(false);

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if (!isLoading && lastVisible) loadRooms(true);
            }
        });

        loadRooms();
    </script>
</body>
</html>
