<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EscapeRooms | מצא את חדר הבריחה הבא שלך</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; scroll-behavior: smooth; }
        .room-card { transition: transform 0.3s ease, border-color 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .room-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .room-closed { border-color: #ef4444 !important; }
        .room-closed img { filter: grayscale(1) brightness(0.4); }
        .neon-loader {
            width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 text-right">

    <header class="p-6 border-b border-slate-800 bg-slate-900/90 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-blue-400 italic">EscapeRooms</h1>
        </div>
        <select id="sort-select" onchange="renderRooms()" class="bg-slate-800 border border-slate-700 rounded-xl text-xs p-2 outline-none text-slate-300">
            <option value="rating">🏆 המדורגים ביותר</option>
            <option value="reviewCount">🔥 הפופולריים ביותר</option>
            <option value="scaryLevel">💀 הכי מפחידים</option>
            <option value="techLevel">🤖 הכי טכנולוגיים</option>
        </select>
    </header>

    <section class="p-4 bg-slate-900/50 flex items-center gap-3 border-b border-slate-800 sticky top-[89px] z-40 backdrop-blur-sm overflow-x-auto hide-scrollbar">
        <button id="filter-kids" onclick="toggleFilter('kids')" class="px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-[11px] font-bold transition-all text-slate-300">👼 מתאים לילדים</button>
        <button id="filter-active" onclick="toggleFilter('active')" class="px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-[11px] font-bold transition-all text-slate-300">🔓 פעילים בלבד</button>
        <div class="flex-grow"></div>
        <p id="rooms-count" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">טוען נתונים...</p>
    </section>

    <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="rooms-container"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let cachedRooms = []; // המטמון המקומי
        let filters = { kids: false, active: false };

        // 1. משיכה חד פעמית של הנתונים
        async function fetchRooms() {
            const container = document.getElementById('rooms-container');
            container.innerHTML = `<div class="col-span-full flex justify-center py-20"><div class="neon-loader"></div></div>`;
            
            try {
                const querySnapshot = await getDocs(collection(db, "rooms"));
                cachedRooms = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderRooms();
            } catch (e) {
                container.innerHTML = `<p class="col-span-full text-center text-red-400">שגיאה בחיבור לשרת.</p>`;
            }
        }

        // 2. רינדור מהיר מהזיכרון
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            const sortKey = document.getElementById('sort-select').value;
            
            // סינון
            let filtered = cachedRooms.filter(room => {
                if (filters.kids && !room.kidFriendly) return false;
                if (filters.active && room.isClosed) return false;
                return true;
            });

            // מיון
            filtered.sort((a, b) => (b[sortKey] || 0) - (a[sortKey] || 0));

            // בניית ה-HTML (שימוש ב-DocumentFragment לביצועים טובים יותר אם היו מאות חדרים)
            container.innerHTML = filtered.map(room => `
                <div class="room-card glass rounded-[2rem] overflow-hidden flex flex-col cursor-pointer ${room.isClosed ? 'room-closed' : ''}" onclick="window.location.href='room.html?id=${room.id}'">
                    <div class="relative h-44">
                        <img src="${room.image || 'https://images.unsplash.com/photo-1519074063912-ad25b57b984a?q=80&w=400'}" class="w-full h-full object-cover" loading="lazy">
                        ${room.isClosed ? `<div class="absolute inset-0 bg-red-900/20 flex items-center justify-center font-black text-white">סגור 🔒</div>` : ''}
                        <div class="absolute top-3 left-3 bg-slate-900/80 px-2 py-1 rounded-xl text-xs font-bold border border-white/10 text-yellow-400">⭐ ${room.rating?.toFixed(1) || '0.0'}</div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-bold text-white/90">${room.name}</h3>
                        <p class="text-slate-400 text-xs mb-4">📍 ${room.location}</p>
                        <div class="flex gap-4">
                            <div class="flex-1"><div class="text-[8px] text-slate-500 uppercase mb-1">פחד</div><div class="bg-slate-800 h-1 rounded-full"><div class="bg-red-500 h-full rounded-full" style="width:${(room.scaryLevel || 0)*10}%"></div></div></div>
                            <div class="flex-1"><div class="text-[8px] text-slate-500 uppercase mb-1">טכנו</div><div class="bg-slate-800 h-1 rounded-full"><div class="bg-purple-500 h-full rounded-full" style="width:${(room.techLevel || 0)*10}%"></div></div></div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('rooms-count').innerText = `${filtered.length} חדרים נמצאו`;
        }

        // 3. ניהול פילטרים ללא קריאת רשת
        window.toggleFilter = (type) => {
            filters[type] = !filters[type];
            const btn = document.getElementById(`filter-${type}`);
            const isActive = filters[type];
            
            btn.classList.toggle('bg-slate-800', !isActive);
            btn.classList.toggle(type === 'kids' ? 'bg-green-600' : 'bg-blue-600', isActive);
            btn.classList.toggle('text-white', isActive);
            
            renderRooms();
        };

        window.renderRooms = renderRooms;
        fetchRooms();
    </script>
</body>
</html>
