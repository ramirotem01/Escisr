<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרכון שלי | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .badge-locked { filter: grayscale(1); opacity: 0.2; transform: scale(0.9); }
        .badge-unlocked { filter: none; opacity: 1; transform: scale(1); transition: all 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="pb-24">

    <header class="p-8 text-center bg-gradient-to-b from-slate-900 to-transparent">
        <div class="relative inline-block">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full mx-auto flex items-center justify-center text-4xl border-4 border-slate-900 shadow-2xl relative z-10">
                🕵️‍♂️
            </div>
            <div id="user-status-tag" class="absolute -bottom-1 -right-1 bg-blue-500 text-[10px] px-2 py-1 rounded-full font-black border-2 border-slate-900 z-20 shadow-lg">PRO</div>
        </div>
        <h1 id="user-name" class="text-2xl font-black mt-4 tracking-tight">הדרכון שלי</h1>
        <p id="user-rank" class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mt-1">טוען דרגה...</p>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 rounded-[2rem] text-center border-t-2 border-blue-500 shadow-xl">
                <div id="count-rooms" class="text-4xl font-black text-white italic">0</div>
                <div class="text-[9px] text-slate-500 font-bold uppercase mt-1">חדרים שבוצעו</div>
            </div>
            <div class="glass p-5 rounded-[2rem] text-center border-t-2 border-purple-500 shadow-xl">
                <div id="count-points" class="text-4xl font-black text-white italic">0</div>
                <div class="text-[9px] text-slate-500 font-bold uppercase mt-1">נקודות XP</div>
            </div>
        </div>

        <section>
            <h3 class="text-[10px] font-black text-slate-500 mb-4 px-2 uppercase tracking-widest text-center">תגים והישגים</h3>
            <div class="grid grid-cols-4 gap-3">
                <div id="badge-starter" class="text-center badge-locked">
                    <div class="glass p-3 rounded-2xl text-2xl mb-2 shadow-inner">🐣</div>
                    <span class="text-[8px] font-bold text-slate-400 block">מתחיל</span>
                </div>
                <div id="badge-scary" class="text-center badge-locked">
                    <div class="glass p-3 rounded-2xl text-2xl mb-2 shadow-inner">🔥</div>
                    <span class="text-[8px] font-bold text-slate-400 block">שורד אימה</span>
                </div>
                <div id="badge-tech" class="text-center badge-locked">
                    <div class="glass p-3 rounded-2xl text-2xl mb-2 shadow-inner">🤖</div>
                    <span class="text-[8px] font-bold text-slate-400 block">טכנולוג</span>
                </div>
                <div id="badge-master" class="text-center badge-locked">
                    <div class="glass p-3 rounded-2xl text-2xl mb-2 shadow-inner">🏆</div>
                    <span class="text-[8px] font-bold text-slate-400 block">מאסטר</span>
                </div>
            </div>
        </section>

        <section>
            <h3 class="text-[10px] font-black text-slate-500 mb-4 px-2 uppercase tracking-widest text-right">היסטוריית דירוגים</h3>
            <div id="activity-list" class="space-y-4">
                <div class="text-center py-10">
                    <div class="animate-pulse text-slate-700 text-sm italic">טוען את ההיסטוריה שלך...</div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">ראשי</span>
        </a>
        <a href="compare.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px] font-bold">השוואה</span>
        </a>
        <a href="add-review.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400 transition">
            <span class="text-xl">✍️</span>
            <span class="text-[10px] font-bold">דירוג</span>
        </a>
        <a href="passport.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🛂</span>
            <span class="text-[10px] font-bold">הדרכון</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPassportData() {
            const list = document.getElementById('activity-list');
            try {
                // 1. שליפת כל הביקורות (ממוינות לפי תאריך יצירה)
                const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                const count = querySnapshot.size;
                document.getElementById('count-rooms').innerText = count;
                document.getElementById('count-points').innerText = count * 150; // 150XP לכל חדר

                // 2. עדכון דרגה לפי כמות
                let rank = "סוכן מתחיל";
                if (count >= 3) rank = "פורץ מנעולים מוסמך";
                if (count >= 10) rank = "אמן בריחה בינלאומי";
                document.getElementById('user-rank').innerText = rank;

                // 3. שחרור תגים
                if (count > 0) document.getElementById('badge-starter').className = "text-center badge-unlocked";
                if (count >= 5) document.getElementById('badge-tech').className = "text-center badge-unlocked";
                if (count >= 10) document.getElementById('badge-master').className = "text-center badge-unlocked";

                // 4. בניית רשימת פעילות עם שמות חדרים אמיתיים
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-600 text-sm italic">טרם דירגת חדרים. הגיע הזמן להתחיל!</div>';
                    return;
                }

                list.innerHTML = '';
                
                // לולאה אסינכרונית כדי להביא את שם החדר לכל ביקורת
                for (const reviewDoc of querySnapshot.docs) {
                    const review = reviewDoc.data();
                    let roomName = "חדר לא ידוע";
                    
                    // שליפת שם החדר מתוך אוסף rooms לפי ה-ID ששמור בביקורת
                    if (review.roomId) {
                        const roomRef = doc(db, "rooms", review.roomId);
                        const roomSnap = await getDoc(roomRef);
                        if (roomSnap.exists()) {
                            roomName = roomSnap.data().name;
                        }
                    }

                    const dateStr = review.createdAt ? new Date(review.createdAt).toLocaleDateString('he-IL') : 'לאחרונה';
                    const ratingStars = "⭐".repeat(Math.round(review.rating || 0));

                    list.innerHTML += `
                        <div class="glass p-5 rounded-3xl flex justify-between items-center animate-fade-in shadow-lg border-r-4 border-blue-500">
                            <div>
                                <h4 class="font-black text-sm text-white">${roomName}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] text-slate-500 font-bold">${dateStr}</span>
                                    <span class="text-[9px] text-slate-400 bg-slate-800 px-1.5 py-0.5 rounded italic">הושלם ✅</span>
                                </div>
                            </div>
                            <div class="text-left">
                                <div class="text-[10px] text-yellow-500 drop-shadow-[0_0_8px_rgba(234,179,8,0.4)]">${ratingStars}</div>
                                <div class="text-[8px] text-slate-500 font-bold mt-1 uppercase">${review.rating ? review.rating.toFixed(1) : '0.0'} / 10</div>
                            </div>
                        </div>
                    `;
                }

            } catch (error) {
                console.error("Error loading passport:", error);
                list.innerHTML = '<div class="text-center text-red-400 text-xs p-10">שגיאה בטעינת הנתונים מה-Database.</div>';
            }
        }

        loadPassportData();
    </script>
</body>
</html>
