<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרכון שלי | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .badge-locked { filter: grayscale(1); opacity: 0.3; }
    </style>
</head>
<body class="pb-24">

    <header class="p-8 text-center">
        <div class="relative inline-block">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full mx-auto flex items-center justify-center text-4xl border-4 border-slate-900 shadow-xl">
                🕵️‍♂️
            </div>
            <div class="absolute -bottom-1 -right-1 bg-blue-500 text-[10px] px-2 py-1 rounded-full font-bold border-2 border-slate-900">PRO</div>
        </div>
        <h1 id="user-name" class="text-2xl font-bold mt-4">הדרכון שלי</h1>
        <p id="user-rank" class="text-blue-400 text-xs font-medium uppercase tracking-widest">טוען דרגה...</p>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl text-center border-t-2 border-blue-500">
                <div id="count-rooms" class="text-3xl font-black text-white">0</div>
                <div class="text-[10px] text-slate-500 uppercase">חדרים שבוצעו</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-t-2 border-purple-500">
                <div id="count-points" class="text-3xl font-black text-white">0</div>
                <div class="text-[10px] text-slate-500 uppercase">נקודות ניסיון</div>
            </div>
        </div>

        <section>
            <h3 class="text-sm font-bold text-slate-400 mb-4 px-1">תגים והישגים</h3>
            <div class="grid grid-cols-4 gap-3">
                <div id="badge-starter" class="text-center badge-locked">
                    <div class="glass p-3 rounded-xl text-2xl mb-1">🐣</div>
                    <span class="text-[9px] text-slate-500">מתחיל</span>
                </div>
                <div id="badge-scary" class="text-center badge-locked">
                    <div class="glass p-3 rounded-xl text-2xl mb-1">🔥</div>
                    <span class="text-[9px] text-slate-500">שורד אימה</span>
                </div>
                <div id="badge-tech" class="text-center badge-locked">
                    <div class="glass p-3 rounded-xl text-2xl mb-1">🤖</div>
                    <span class="text-[9px] text-slate-500">טכנולוג</span>
                </div>
                <div id="badge-master" class="text-center badge-locked">
                    <div class="glass p-3 rounded-xl text-2xl mb-1">🏆</div>
                    <span class="text-[9px] text-slate-500">מאסטר</span>
                </div>
            </div>
        </section>

        <section>
            <h3 class="text-sm font-bold text-slate-400 mb-4 px-1">פעילות אחרונה</h3>
            <div id="activity-list" class="space-y-3">
                <div class="text-center py-10 text-slate-600 text-sm italic">
                    טרם ביקרת בחדרים? הגיע הזמן להתחיל!
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
        <a href="compare.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px]">השוואה</span>
        </a>
        <a href="add-review.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">✍️</span>
            <span class="text-[10px]">דרג חדר</span>
        </a>
        <a href="passport.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🛂</span>
            <span class="text-[10px]">הדרכון</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPassportData() {
            try {
                // שליפת כל הביקורות (במערכת אמיתית נסנן לפי UserId)
                const q = query(collection(db, "reviews"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                const count = querySnapshot.size;
                document.getElementById('count-rooms').innerText = count;
                document.getElementById('count-points').innerText = count * 100; // חישוב נקודות פיקטיבי

                // עדכון דרגה
                let rank = "מתחיל";
                if (count > 2) rank = "פורץ מנעולים חובב";
                if (count > 5) rank = "אמן בריחה";
                document.getElementById('user-rank').innerText = `דרגה: ${rank}`;

                // שחרור תגים
                if (count > 0) document.getElementById('badge-starter').classList.remove('badge-locked');
                if (count >= 10) document.getElementById('badge-master').classList.remove('badge-locked');

                // מילוי רשימת פעילות
                const list = document.getElementById('activity-list');
                if (!querySnapshot.empty) {
                    list.innerHTML = '';
                    querySnapshot.forEach((doc) => {
                        const review = doc.data();
                        const date = review.timestamp?.toDate().toLocaleDateString('he-IL') || 'לאחרונה';
                        
                        list.innerHTML += `
                            <div class="glass p-4 rounded-xl flex justify-between items-center animate-fade-in">
                                <div>
                                    <h4 class="font-bold text-sm text-blue-100">ביקור בחדר</h4>
                                    <p class="text-[10px] text-slate-500">${date}</p>
                                </div>
                                <div class="text-yellow-500 text-xs">${"⭐".repeat(review.rating)}</div>
                            </div>
                        `;
                    });
                }

            } catch (error) {
                console.error("Error loading passport:", error);
            }
        }

        loadPassportData();
    </script>
</body>
</html>
