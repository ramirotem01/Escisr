<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר חדרי בריחה AI | EscapeRooms</title>
    <meta name="description" content="מצא את חדר הבריחה המושלם עבורך באמצעות בינה מלאכותית">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .result-card { transition: all 0.3s ease; }
        .result-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-56 w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-900/20 to-[#0f172a]"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-3xl font-bold text-white italic mb-2">מאתר החדרים ה<span class="text-blue-400 text-4xl">AI</span></h1>
            <p class="text-slate-400 text-sm">איזה סוג של הרפתקה אתם מחפשים היום?</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 -mt-10 relative z-10">
        
        <div class="glass p-2 rounded-2xl ai-glow mb-8">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="ai-search-input" 
                    placeholder="לדוגמא: חדר טכנולוגי קשה עם עלילה יפה..." 
                    class="w-full bg-slate-800/50 border-none rounded-xl py-4 px-5 text-white focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleSearch()" id="search-btn"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold transition-all">
                    חפש לי
                </button>
            </div>
        </div>

        <div id="status-msg" class="hidden text-center py-8">
            <div class="inline-block animate-bounce mb-2">🔍</div>
            <p class="text-slate-400 text-sm italic" id="status-text">ה-AI מנתח את כל חדרי הבריחה עבורך...</p>
        </div>

        <div id="results-container" class="grid grid-cols-1 gap-4">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🔍</span>
            <span class="text-[10px]">חיפוש AI</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // פונקציה לשליפת ה-API Key מה-DB (כפי שמוגדר ב-PCS365)
        async function getGeminiKey() {
            try {
                const configDoc = await getDoc(doc(db, "system_config", "geimini_settings"));
                if (configDoc.exists()) {
                    return configDoc.data().apiKey;
                }
                console.error("Config document not found");
                return null;
            } catch (e) {
                console.error("Error fetching config:", e);
                return null;
            }
        }

        window.handleSearch = async function() {
            const userInput = document.getElementById('ai-search-input').value;
            if (!userInput) return;

            const resultsContainer = document.getElementById('results-container');
            const statusMsg = document.getElementById('status-msg');
            const btn = document.getElementById('search-btn');

            // איפוס תצוגה
            resultsContainer.innerHTML = '';
            statusMsg.classList.remove('hidden');
            btn.disabled = true;

            try {
                // 1. שליפת המפתח מה-DB
                const apiKey = await getGeminiKey();
                if (!apiKey || apiKey === "AIX") {
                    throw new Error("נא לעדכן את ה-API Key ב-Firestore (collection: system_config)");
                }

                // 2. שליפת כל החדרים כ-Context
                const roomsSnap = await getDocs(collection(db, "rooms"));
                let roomsData = [];
                roomsSnap.forEach(d => {
                    const data = d.data();
                    roomsData.push({
                        id: d.id,
                        name: data.name,
                        description: data.description,
                        location: data.location,
                        tags: [
                            data.kidFriendly ? "מתאים לילדים" : "",
                            data.scaryLevel > 6 ? "מפחיד" : "",
                            data.techLevel > 6 ? "טכנולוגי" : ""
                        ].filter(t => t !== "")
                    });
                });

                // 3. בניית הפרומפט ופנייה ל-Gemini
                const prompt = `אתה מומחה לחדרי בריחה. לפניך רשימת חדרים: ${JSON.stringify(roomsData)}. המשתמש מחפש: "${userInput}". בחר את 3 החדרים הכי מתאימים והחזר רק מערך JSON של ה-IDs שלהם, לדוגמה: ["id1", "id2"]`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const cleanJson = rawText.replace(/```json|```/g, "").trim();
                const recommendedIds = JSON.parse(cleanJson);

                // 4. הצגת התוצאות
                statusMsg.classList.add('hidden');
                btn.disabled = false;
                
                const filteredRooms = roomsData.filter(r => recommendedIds.includes(r.id));
                renderResults(filteredRooms);

            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = `<p class="text-red-400 text-sm">שגיאה: ${error.message}</p>`;
                btn.disabled = false;
            }
        }

        function renderResults(rooms) {
            const container = document.getElementById('results-container');
            if (rooms.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 italic">לא מצאנו משהו שמתאים בדיוק... נסו לתאר אחרת</p>`;
                return;
            }

            rooms.forEach(room => {
                container.innerHTML += `
                    <a href="room-details.html?id=${room.id}" class="result-card glass p-4 rounded-2xl flex flex-col gap-2 border border-white/5">
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-bold text-blue-400 italic">${room.name}</h3>
                            <span class="text-[10px] text-slate-500 italic">📍 ${room.location}</span>
                        </div>
                        <p class="text-slate-300 text-xs line-clamp-2">${room.description || ''}</p>
                        <div class="flex gap-2 mt-2">
                            ${room.tags.map(t => `<span class="text-[9px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/20">${t}</span>`).join('')}
                        </div>
                    </a>
                `;
            });
        }
    </script>
</body>
</html>
