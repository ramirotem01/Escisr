<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר חדרי בריחה AI | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .result-card { transition: all 0.3s ease; }
        .result-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-56 w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-900/20 to-[#0f172a]"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-3xl font-bold text-white italic mb-2 text-blue-400">SEARCH AI</h1>
            <p class="text-slate-400 text-sm">תאר לנו את החדר שאתה מדמיין...</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 -mt-10 relative z-10">
        
        <div class="glass p-2 rounded-2xl ai-glow mb-8">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="ai-search-input" 
                    placeholder="לדוגמא: חדר מפחיד מאוד עם טכנולוגיה מתקדמת..." 
                    class="w-full bg-slate-800/50 border-none rounded-xl py-4 px-5 text-white focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleSearch()" id="search-btn"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold transition-all">
                    שאל את ה-AI
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden text-center py-8">
            <p class="text-blue-400 animate-pulse italic" id="status-text">ה-AI מנתח את כל החדרים ב-DB...</p>
        </div>

        <div id="results-container" class="grid grid-cols-1 gap-4"></div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🔍</span>
            <span class="text-[10px]">חיפוש AI</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // שליפת מפתח ה-AI בדיוק מהמיקום שציינת
        async function getGeminiKey() {
            const docRef = doc(db, "system_config", "geimini_settings");
            const docSnap = await getDoc(docRef);
            return docSnap.exists() ? docSnap.data().apiKey : null;
        }

        window.handleSearch = async function() {
            const userInput = document.getElementById('ai-search-input').value.trim();
            if (!userInput) return;

            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');
            const btn = document.getElementById('search-btn');

            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            btn.disabled = true;

            try {
                // 1. שליפת המפתח
                const apiKey = await getGeminiKey();
                if (!apiKey || apiKey === "AIX") throw new Error("API Key missing");

                // 2. שליפת כל החדרים (כפי שנעשה בדף הפרטים)
                const querySnapshot = await getDocs(collection(db, "rooms"));
                let roomsData = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    roomsData.push({
                        id: doc.id,
                        name: data.name,
                        description: data.description,
                        location: data.location,
                        scaryLevel: data.scaryLevel,
                        techLevel: data.techLevel
                    });
                });

                // 3. פנייה לג'מיני
                const prompt = `אתה מומחה לחדרי בריחה. לפניך רשימת החדרים ב-DB: ${JSON.stringify(roomsData)}. המשתמש מחפש: "${userInput}". בחר את 3 המתאימים ביותר והחזר רק מערך JSON של ה-IDs. דוגמה: ["id1", "id2"]`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const aiData = await response.json();
                const aiText = aiData.candidates[0].content.parts[0].text;
                const recommendedIds = JSON.parse(aiText.replace(/```json|```/g, "").trim());

                // 4. הצגה
                statusContainer.classList.add('hidden');
                btn.disabled = false;
                
                const filteredRooms = roomsData.filter(r => recommendedIds.includes(r.id));
                renderResults(filteredRooms);

            } catch (error) {
                console.error(error);
                statusContainer.innerHTML = "<p class='text-red-400'>שגיאה בחיבור ל-AI. וודא שהנתונים ב-DB תקינים.</p>";
                btn.disabled = false;
            }
        }

        function renderResults(rooms) {
            const container = document.getElementById('results-container');
            rooms.forEach(room => {
                container.innerHTML += `
                    <a href="room-details.html?id=${room.id}" class="result-card glass p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div>
                            <h3 class="text-blue-400 font-bold italic">${room.name}</h3>
                            <p class="text-slate-500 text-[10px]">📍 ${room.location}</p>
                        </div>
                        <div class="text-blue-500 font-bold">←</div>
                    </a>
                `;
            });
        }
    </script>
</body>
</html>
