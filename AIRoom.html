<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Finder | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Heebo', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .loader {
            width: 40px; height: 40px;
            border: 3px solid transparent;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic">AI Room Finder</h1>
            <p class="text-slate-400 mt-2">תאר לי איזה חדר אתה מחפש, ואמצא לך אותו בשניות...</p>
        </header>

        <div class="glass p-6 rounded-[2rem] mb-8">
            <textarea id="user-input" placeholder="למשל: אני רוצה חדר מפחיד מאוד עם שחקן בתל אביב שמתאים ל-4 אנשים..." 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 h-32 resize-none transition-all"></textarea>
            
            <button id="search-btn" onclick="handleAISearch()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
                <span>✨ מצא לי חדר</span>
            </button>
        </div>

        <div id="status-container" class="hidden flex flex-col items-center gap-4 mb-8">
            <div class="loader"></div>
            <p id="status-text" class="text-blue-400 font-bold animate-pulse text-sm"></p>
        </div>

        <div id="results-container" class="grid gap-6">
            </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">ראשי</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-blue-400">
            <span class="text-xl">🤖</span>
            <span class="text-[10px] font-bold">AI חיפוש</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, collection, getDocs, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        
        // פתרון שגיאת ה-404/RPC: Force Long Polling
        const db = initializeFirestore(app, {
            experimentalForceLongPolling: true
        });

        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY"; // שים כאן את המפתח שלך

        window.handleAISearch = async function() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return alert("בבקשה תכתוב מה אתה מחפש");

            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const resultsContainer = document.getElementById('results-container');
            const searchBtn = document.getElementById('search-btn');

            // Reset UI
            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            searchBtn.disabled = true;
            searchBtn.classList.add('opacity-50');

            try {
                // שלב 1: שליפת נתונים מה-DB בשיטת ה-Batch
                statusText.innerText = "מתחבר לבסיס הנתונים...";
                console.log("Fetching rooms...");
                
                const q = query(collection(db, "rooms"), orderBy("rating", "desc"), limit(40));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    throw new Error("לא נמצאו חדרים בקולקציית הנתונים.");
                }

                const rooms = [];
                snap.forEach(doc => rooms.push({ id: doc.id, ...doc.data() }));
                console.log(`נשלפו ${rooms.length} חדרים.`);

                // שלב 2: פנייה ל-AI
                statusText.innerText = "ה-AI מנתח את הבקשה שלך...";
                
                const prompt = `
                    You are an expert escape room recommender in Israel. 
                    Based on the user request: "${input}"
                    And this list of rooms: ${JSON.stringify(rooms.map(r => ({ id: r.id, name: r.name, location: r.location, scaryLevel: r.scaryLevel, rating: r.rating })))}
                    
                    Return ONLY a JSON array of the top 3 most relevant room IDs. 
                    Example format: ["ID1", "ID2", "ID3"]
                `;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                const recommendedIds = JSON.parse(aiText.match(/\[.*\]/s)[0]);

                // שלב 3: הצגת תוצאות
                statusContainer.classList.add('hidden');
                
                recommendedIds.forEach(id => {
                    const room = rooms.find(r => r.id === id);
                    if (room) {
                        resultsContainer.innerHTML += renderResultCard(room);
                    }
                });

            } catch (error) {
                console.error("AI Search Error:", error);
                statusText.innerText = "אופס... משהו השתבש. נסה שוב.";
                alert("שגיאה: " + error.message);
            } finally {
                searchBtn.disabled = false;
                searchBtn.classList.remove('opacity-50');
            }
        };

        function renderResultCard(room) {
            return `
                <div class="glass p-5 rounded-3xl border-l-4 border-blue-500 animate-fadeIn" onclick="window.location.href='room.html?id=${room.id}'">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold">${room.name}</h3>
                        <span class="text-yellow-400 font-bold">⭐ ${room.rating || 'N/A'}</span>
                    </div>
                    <p class="text-slate-400 text-sm mb-4">📍 ${room.location}</p>
                    <div class="flex gap-4">
                        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">
                            💀 פחד: ${room.scaryLevel || 0}/10
                        </div>
                        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">
                            🤖 טכנולוגיה: ${room.techLevel || 0}/10
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
