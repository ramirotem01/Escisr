<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Finder | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Heebo', sans-serif; text-align: right; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic tracking-tighter">EscapeRooms AI</h1>
            <p class="text-slate-400 mt-2">חיפוש חכם מבוסס בינה מלאכותית</p>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-8 shadow-2xl">
            <textarea id="user-input" placeholder="תאר את החדר שאתה מחפש... למשל: חדר עם שחקן לילדים" 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 h-32 resize-none transition-all text-lg"></textarea>
            
            <button id="search-btn" onclick="handleAISearch()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                <span>✨ מצא לי חדר</span>
            </button>
        </div>

        <div id="status-container" class="hidden flex flex-col items-center gap-4 mb-8">
            <div class="loader"></div>
            <p id="status-text" class="text-blue-400 font-bold animate-pulse text-sm"></p>
        </div>

        <div id="results-container" class="grid gap-6"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // הקונפיגורציה שסיפקת בתחילת השיחה
        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        // אתחול Firebase והגדרת db
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cachedApiKey = null;

        async function fetchApiKey() {
            if (cachedApiKey) return cachedApiKey;
            try {
                // שים לב לאיות geimini כפי שמופיע ב-DB שלך
                const doc = await db.collection("system_config").doc("geimini_settings").get();
                if (doc.exists) {
                    cachedApiKey = doc.data().apiKey;
                    return cachedApiKey;
                } else {
                    throw new Error("מפתח AI לא נמצא ב-system_config/geimini_settings");
                }
            } catch (e) {
                console.error("Key fetch error:", e);
                throw e;
            }
        }

        async function getAvailableModel(apiKey) {
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await resp.json();
                const model = data.models.find(m => m.supportedGenerationMethods.includes("generateContent"));
                return model ? model.name : "models/gemini-1.5-flash"; 
            } catch (e) {
                return "models/gemini-1.5-flash";
            }
        }

        async function handleAISearch() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return;

            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const resultsContainer = document.getElementById('results-container');
            const searchBtn = document.getElementById('search-btn');

            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            searchBtn.disabled = true;

            try {
                statusText.innerText = "מתחבר ל-AI...";
                const apiKey = await fetchApiKey();
                const modelName = await getAvailableModel(apiKey);

                statusText.innerText = "סורק חדרים...";
                // שליפת חדרים שאינם סגורים
                const snapshot = await db.collection("rooms").where("isClosed", "==", false).get();
                const rooms = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    rooms.push({
                        id: doc.id,
                        name: data.name || "ללא שם",
                        location: data.location || "לא מצוין",
                        rating: data.rating || 0
                    });
                });

                statusText.innerText = "ה-AI מחשב התאמות...";
                const prompt = `User wants: "${input}". Recommend from: ${JSON.stringify(rooms)}. Return ONLY a JSON array of the top 3 IDs: ["id1", "id2", "id3"]`;

                const url = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                const cleanJson = aiText.replace(/```json/g, "").replace(/```/g, "").trim();
                const recommendedIds = JSON.parse(cleanJson);

                statusContainer.classList.add('hidden');
                recommendedIds.forEach(id => {
                    const room = rooms.find(r => r.id === id);
                    if (room) {
                        resultsContainer.innerHTML += `
                            <div class="glass p-6 rounded-[2rem] border-r-4 border-blue-500 animate-fadeIn cursor-pointer" 
                                 onclick="window.location.href='room.html?id=${room.id}'">
                                <div class="flex justify-between">
                                    <h3 class="text-xl font-bold">${room.name}</h3>
                                    <span class="text-yellow-400">⭐ ${Number(room.rating).toFixed(1)}</span>
                                </div>
                                <p class="text-slate-400 text-sm">📍 ${room.location}</p>
                            </div>`;
                    }
                });

            } catch (error) {
                console.error("Process error:", error);
                alert("שגיאה: " + error.message);
                statusContainer.classList.add('hidden');
            } finally {
                searchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
