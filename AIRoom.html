<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר חדרי בריחה AI | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ai-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .result-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .result-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.9); }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-60 w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-600/10 to-[#0f172a]"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
                SEARCH <span class="text-blue-500">AI</span>
            </h1>
            <p class="text-slate-400 text-sm font-light">הבינה המלאכותית תמצא לכם את החדר הבא</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 -mt-12 relative z-10">
        
        <div class="glass p-3 rounded-2xl ai-glow mb-10">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="ai-search-input" 
                    placeholder="לדוגמא: חדר מפחיד עם חידות טכנולוגיות..." 
                    class="w-full bg-slate-900/50 border-none rounded-xl py-4 px-6 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleSearch()" id="search-btn"
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-lg">
                    חפש חדר
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p id="status-text" class="text-slate-400 text-sm italic italic">ה-AI מנתח את מאגר החדרים...</p>
        </div>

        <div id="results-container" class="grid grid-cols-1 gap-4"></div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-500 font-bold">
            <span class="text-xl">🔍</span>
            <span class="text-[10px]">חיפוש AI</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
    </nav>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // אותן הגדרות בדיוק כמו בדפים שעובדים לך
    const firebaseConfig = {
        apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
        authDomain: "escisr.firebaseapp.com",
        projectId: "escisr",
        storageBucket: "escisr.firebasestorage.app",
        messagingSenderId: "907984583225",
        appId: "1:907984583225:web:66777e44fb162f68c3abe8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.handleSearch = async function() {
        const userInput = document.getElementById('ai-search-input').value.trim();
        if (!userInput) return;

        const btn = document.getElementById('search-btn');
        const statusText = document.getElementById('status-text');
        const resultsContainer = document.getElementById('results-container');
        
        // הכנת ה-UI
        document.getElementById('status-container').classList.remove('hidden');
        resultsContainer.innerHTML = '';
        btn.disabled = true;
        statusText.innerText = "מתחבר לבסיס הנתונים...";

        try {
            // 1. שליפת ה-API KEY של Gemini מה-DB
            const configSnap = await getDoc(doc(db, "system_config", "geimini_settings"));
            if (!configSnap.exists()) throw new Error("מפתח ה-AI לא נמצא בשרת");
            const apiKey = configSnap.data().apiKey;

            // 2. שליפת כל החדרים (בדיוק כמו בדף הניהול)
            statusText.innerText = "סורק חדרים רלוונטיים...";
            const roomsSnap = await getDocs(collection(db, "rooms"));
            
            if (roomsSnap.empty) throw new Error("לא נמצאו חדרים בקולקציה");

            let roomsData = [];
            roomsSnap.forEach(d => {
                roomsData.push({ id: d.id, ...d.data() });
            });

            // 3. שליחה ל-Gemini לניתוח
            statusText.innerText = "הבינה המלאכותית מנתחת את הבקשה שלך...";
            
            const prompt = `You are a helpful assistant for an Israeli Escape Room portal. 
            Here is a list of escape rooms in JSON format: ${JSON.stringify(roomsData)}.
            The user is looking for: "${userInput}".
            Analyze the user's request and return ONLY a JSON array of the "id"s of the most relevant rooms (up to 3).
            Return only the array, no words around it. Example: ["id1", "id2"]`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            
            if (!data.candidates || !data.candidates[0]) {
                throw new Error("תקשורת לקויה עם ה-AI, נסה שוב.");
            }

            const aiResponseText = data.candidates[0].content.parts[0].text;
            // ניקוי תגיות Markdown אם Gemini החזיר כאלו
            const cleanJson = aiResponseText.replace(/```json|```/g, "").trim();
            const recommendedIds = JSON.parse(cleanJson);

            // 4. סינון והצגה
            const finalRecommendations = roomsData.filter(r => recommendedIds.includes(r.id));
            
            if (finalRecommendations.length === 0) {
                statusText.innerText = "לא מצאתי חדרים שמתאימים בדיוק לתיאור הזה...";
            } else {
                document.getElementById('status-container').classList.add('hidden');
                renderResults(finalRecommendations);
            }

        } catch (error) {
            console.error("AI Search Error:", error);
            statusText.innerHTML = `<span class="text-red-400">שגיאה: ${error.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    };

    function renderResults(rooms) {
        const container = document.getElementById('results-container');
        container.innerHTML = '';
        rooms.forEach(room => {
            container.innerHTML += `
                <div class="glass p-5 rounded-3xl border border-blue-500/30 mb-4 animate-fade-in">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-xl font-bold text-white">${room.name}</h3>
                        <span class="text-yellow-400 text-sm">⭐ ${room.rating}</span>
                    </div>
                    <p class="text-slate-400 text-sm mb-4">${room.description || 'אין תיאור זמין'}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-slate-500 italic">📍 ${room.location}</span>
                        <a href="room.html?id=${room.id}" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-xl font-bold hover:bg-blue-500 transition">הזמן עכשיו</a>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
