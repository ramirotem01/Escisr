<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר חדרי בריחה AI | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ai-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .result-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .result-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.9); }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-60 w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-600/10 to-[#0f172a]"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
                SEARCH <span class="text-blue-500">AI</span>
            </h1>
            <p class="text-slate-400 text-sm font-light">הבינה המלאכותית תמצא לכם את החדר הבא</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 -mt-12 relative z-10">
        
        <div class="glass p-3 rounded-2xl ai-glow mb-10">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="ai-search-input" 
                    placeholder="לדוגמא: חדר מפחיד עם חידות טכנולוגיות..." 
                    class="w-full bg-slate-900/50 border-none rounded-xl py-4 px-6 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleSearch()" id="search-btn"
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-lg">
                    חפש חדר
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p id="status-text" class="text-slate-400 text-sm italic italic">ה-AI מנתח את מאגר החדרים...</p>
        </div>

        <div id="results-container" class="grid grid-cols-1 gap-4"></div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-500 font-bold">
            <span class="text-xl">🔍</span>
            <span class="text-[10px]">חיפוש AI</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // שליפת מפתח ה-AI בדיוק כמו ב-PCS
        async function getGeminiKey() {
            try {
                const configDoc = await getDoc(doc(db, "system_config", "geimini_settings"));
                return configDoc.exists() ? configDoc.data().apiKey.trim() : null;
            } catch (e) {
                console.error("Error fetching API Key:", e);
                return null;
            }
        }

        window.handleSearch = async function() {
            const inputField = document.getElementById('ai-search-input');
            const userInput = inputField.value.trim();
            if (!userInput) return;

            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const btn = document.getElementById('search-btn');

            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            btn.disabled = true;

            try {
                // 1. קבלת מפתח וחדרים בבת אחת
                const [apiKey, roomsSnap] = await Promise.all([
                    getGeminiKey(),
                    getDocs(collection(db, "rooms"))
                ]);

                if (!apiKey || apiKey === "AIX") throw new Error("מפתח API לא תקין ב-system_config");
                
                let roomsData = [];
                roomsSnap.forEach(d => {
                    const data = d.data();
                    roomsData.push({
                        id: d.id,
                        name: data.name || "ללא שם",
                        location: data.location || "",
                        description: data.description || ""
                    });
                });

                if (roomsData.length === 0) throw new Error("לא נמצאו חדרים בבסיס הנתונים");

                // 2. פנייה ל-API בגרסת v1 היציבה
                const prompt = `אתה עוזר חכם למציאת חדרי בריחה. רשימת חדרים: ${JSON.stringify(roomsData)}. המשתמש מחפש: "${userInput}". בחר את 3 הכי מתאימים והחזר אך ורק מערך JSON של IDs. דוגמה: ["id1", "id2"]`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                // 3. הגנה מפני שגיאות 404 או תשובות ריקות
                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || !data.candidates[0]) throw new Error("ה-AI לא הצליח לגבש המלצה. נסה שוב.");

                const rawText = data.candidates[0].content.parts[0].text;
                const cleanJson = rawText.replace(/```json|```/g, "").trim();
                const recommendedIds = JSON.parse(cleanJson);

                // 4. סינון והצגה
                const finalRooms = roomsData.filter(r => recommendedIds.includes(r.id));
                statusContainer.classList.add('hidden');
                btn.disabled = false;
                renderResults(finalRooms);

            } catch (error) {
                console.error("Search Error:", error);
                statusText.innerHTML = `<span class="text-red-400">שגיאה: ${error.message}</span>`;
                btn.disabled = false;
            }
        }

        function renderResults(rooms) {
            const container = document.getElementById('results-container');
            if (rooms.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10">לא נמצאו התאמות מדויקות. נסו תיאור אחר.</p>`;
                return;
            }
            rooms.forEach(room => {
                container.innerHTML += `
                    <a href="room-details.html?id=${room.id}" class="result-card glass p-5 rounded-2xl flex items-center justify-between">
                        <div>
                            <h3 class="text-blue-400 font-bold text-lg">${room.name}</h3>
                            <p class="text-slate-400 text-xs italic">📍 ${room.location}</p>
                            <p class="text-slate-300 text-[11px] mt-1 line-clamp-1 font-light">${room.description}</p>
                        </div>
                        <div class="bg-blue-500/10 p-2 rounded-full text-blue-500">←</div>
                    </a>
                `;
            });
        }
    </script>
</body>
</html>
