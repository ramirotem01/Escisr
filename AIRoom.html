<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר חדרי בריחה AI | EscapeRooms</title>
    
    <meta name="description" content="מאתר חדרי בריחה חכם מבוסס בינה מלאכותית - מצאו את החדר המושלם עבורכם">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ai-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .result-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .result-card:hover { transform: translateY(-4px); border-color: rgba(59, 130, 246, 0.4); background: rgba(30, 41, 59, 0.9); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-60 w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-600/10 to-[#0f172a]"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
                SEARCH <span class="text-blue-500 underline decoration-blue-500/30">AI</span>
            </h1>
            <p class="text-slate-400 text-sm font-light">הבינה המלאכותית תמצא לכם את החדר הבא</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 -mt-12 relative z-10">
        
        <div class="glass p-3 rounded-2xl ai-glow mb-10">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="ai-search-input" 
                    placeholder="לדוגמא: חדר קריפי עם עלילה טובה ל-4 אנשים..." 
                    class="w-full bg-slate-900/50 border-none rounded-xl py-4 px-6 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600">
                <button onclick="handleSearch()" id="search-btn"
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                    חפש חדר
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden text-center py-10">
            <div class="loader inline-block w-8 h-8 border-4 border-slate-700 rounded-full mb-4"></div>
            <p id="status-text" class="text-slate-400 text-sm italic">מנתח את בקשתך מול מאגר החדרים...</p>
        </div>

        <div id="results-container" class="grid grid-cols-1 gap-4">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-blue-500">
            <span class="text-xl">🔍</span>
            <span class="text-[10px] font-bold">חיפוש AI</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-blue-400">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // שליפת מפתח ה-AI מה-DB בדיוק כמו ב-PCS
        async function getGeminiKey() {
            try {
                const configDoc = await getDoc(doc(db, "system_config", "geimini_settings"));
                if (configDoc.exists()) {
                    return configDoc.data().apiKey;
                }
                return null;
            } catch (e) {
                console.error("Firestore Config Error:", e);
                return null;
            }
        }

        window.handleSearch = async function() {
            const inputField = document.getElementById('ai-search-input');
            const userInput = inputField.value.trim();
            if (!userInput) return;

            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const btn = document.getElementById('search-btn');

            // Reset UI
            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            statusText.innerText = "מתחבר למוח הדיגיטלי...";
            btn.disabled = true;

            try {
                // 1. קבלת מפתח וניקוי שלו
                const rawKey = await getGeminiKey();
                const cleanKey = rawKey ? rawKey.trim() : null;

                if (!cleanKey || cleanKey === "AIX") {
                    throw new Error("מפתח API לא מוגדר במערכת (system_config)");
                }

                // 2. שליפת כל החדרים
                statusText.innerText = "קורא נתונים מה-DB...";
                const roomsSnap = await getDocs(collection(db, "rooms"));
                let roomsData = [];
                roomsSnap.forEach(d => {
                    const data = d.data();
                    roomsData.push({
                        id: d.id,
                        name: data.name,
                        description: data.description || "אין תיאור",
                        location: data.location || "לא צוין מיקום",
                        image: data.image || ""
                    });
                });

                if (roomsData.length === 0) throw new Error("לא נמצאו חדרים במאגר");

                // 3. בניית הפרומפט
                const prompt = `אתה עוזר חכם למציאת חדרי בריחה.
                רשימת החדרים הזמינים: ${JSON.stringify(roomsData)}
                בקשת המשתמש: "${userInput}"
                בחר עד 3 חדרים שהכי מתאימים לבקשה. 
                החזר את התשובה בפורמט JSON בלבד, מערך של ה-IDs של החדרים. 
                דוגמה לתשובה: ["ID1", "ID2"]`;

                // 4. פנייה לג'מיני
                statusText.innerText = "ה-AI מגבש המלצות...";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${cleanKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || !data.candidates[0]) throw new Error("תשובה לא תקינה מה-AI");

                const aiResponseText = data.candidates[0].content.parts[0].text;
                const recommendedIds = JSON.parse(aiResponseText.replace(/```json|```/g, "").trim());

                // 5. סינון והצגה
                const finalRooms = roomsData.filter(r => recommendedIds.includes(r.id));
                
                statusContainer.classList.add('hidden');
                btn.disabled = false;
                renderResults(finalRooms);

            } catch (error) {
                console.error("Search Error:", error);
                statusText.innerHTML = `<span class="text-red-400">שגיאה: ${error.message}</span>`;
                btn.disabled = false;
            }
        }

        function renderResults(rooms) {
            const container = document.getElementById('results-container');
            if (rooms.length === 0) {
                container.innerHTML = `<div class="glass p-10 text-center text-slate-500">לא נמצאו התאמות מדויקות. נסה לתאר את החדר במילים אחרות.</div>`;
                return;
            }

            rooms.forEach(room => {
                container.innerHTML += `
                    <a href="room-details.html?id=${room.id}" class="result-card glass p-4 rounded-2xl flex items-center gap-4">
                        ${room.image ? `<img src="${room.image}" class="w-20 h-20 object-cover rounded-xl border border-white/10">` : `<div class="w-20 h-20 bg-slate-800 rounded-xl flex items-center justify-center text-2xl">🧩</div>`}
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="text-lg font-bold text-blue-400 italic">${room.name}</h3>
                            </div>
                            <p class="text-slate-400 text-[11px] mb-1">📍 ${room.location}</p>
                            <p class="text-slate-300 text-xs line-clamp-1 font-light">${room.description}</p>
                        </div>
                        <div class="text-blue-500 font-bold text-xl">←</div>
                    </a>
                `;
            });
        }
    </script>
</body>
</html>
