<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Finder Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Heebo', sans-serif; text-align: right; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .room-image { height: 180px; width: 100%; object-fit: cover; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic tracking-tighter">EscapeRooms AI Debug</h1>
            <p class="text-slate-400 mt-2">בדיקת תקשורת ומבנה נתונים</p>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-8 shadow-2xl">
            <textarea id="user-input" placeholder="תאר את החדר לחיפוש..." 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 h-32 resize-none transition-all text-lg"></textarea>
            
            <button id="search-btn" onclick="handleAISearch()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                <span>🔍 הרץ חיפוש ובדוק קונסול</span>
            </button>
        </div>

        <div id="status-container" class="hidden flex flex-col items-center gap-4 mb-8">
            <div class="loader"></div>
            <p id="status-text" class="text-blue-400 font-bold animate-pulse text-sm"></p>
        </div>

        <div id="results-container" class="grid gap-6"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchApiKey() {
            console.log("--- 1. Fetching API Key ---");
            try {
                const doc = await db.collection("system_config").doc("geimini_settings").get();
                if (doc.exists) {
                    const key = doc.data().apiKey;
                    console.log("Key found (truncated):", key.substring(0, 10) + "...");
                    return key;
                }
                throw new Error("API Key doc missing in Firestore");
            } catch (e) {
                console.error("Firestore Key Error:", e);
                throw e;
            }
        }

        async function handleAISearch() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return;

            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const resultsContainer = document.getElementById('results-container');
            const searchBtn = document.getElementById('search-btn');

            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            searchBtn.disabled = true;

            try {
                statusText.innerText = "Debug: Check Console...";
                const apiKey = await fetchApiKey();

                console.log("--- 2. Fetching Rooms from DB ---");
                const snapshot = await db.collection("rooms").where("isClosed", "==", false).get();
                
                const roomsForDisplay = [];
                const roomsForAI = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    roomsForDisplay.push({ id: doc.id, ...data });
                    roomsForAI.push({
                        id: doc.id,
                        name: data.name,
                        description: data.description || "",
                        kidFriendly: data.kidFriendly || false,
                        location: data.location || "",
                        rating: data.rating || 0,
                        scaryLevel: data.scaryLevel || 0,
                        techLevel: data.techLevel || 0
                    });
                });

                console.log("Rooms found:", roomsForAI.length);
                console.table(roomsForAI); // מציג טבלה יפה בקונסול

                const prompt = `אתה עוזר חכם למציאת חדרי בריחה. המשתמש מחפש: "${input}". 
                רשימת חדרים: ${JSON.stringify(roomsForAI)}.
                החזר אך ורק מערך JSON של 3 ה-IDs המתאימים ביותר: ["id1", "id2", "id3"]`;

                // ניסיון עם ה-URL המלא והגרסה היציבה
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                console.log("--- 3. AI Request ---");
                console.log("URL:", url.split('key=')[0] + "key=HIDDEN");
                console.log("Payload:", { contents: [{ parts: [{ text: prompt }] }] });

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                console.log("--- 4. AI Response Status ---");
                console.log("HTTP Status:", response.status);

                const data = await response.json();
                
                if (!response.ok) {
                    console.error("AI Error Body:", data);
                    throw new Error(`AI Error ${response.status}: ${data.error?.message || 'Unknown'}`);
                }

                console.log("AI Success Body:", data);

                const aiText = data.candidates[0].content.parts[0].text;
                console.log("Raw AI Text:", aiText);

                const cleanJson = aiText.replace(/```json/g, "").replace(/```/g, "").trim();
                const recommendedIds = JSON.parse(cleanJson);
                console.log("Parsed IDs:", recommendedIds);

                statusContainer.classList.add('hidden');
                
                recommendedIds.forEach(id => {
                    const room = roomsForDisplay.find(r => r.id === id);
                    if (room) {
                        resultsContainer.innerHTML += `
                            <div class="glass overflow-hidden rounded-[2.5rem] border-r-4 border-blue-500 animate-fadeIn p-4 mb-4">
                                <h3 class="text-xl font-bold">${room.name}</h3>
                                <p class="text-slate-400">ID: ${room.id}</p>
                            </div>`;
                    }
                });

            } catch (error) {
                console.error("--- DEBUG ERROR REPORT ---");
                console.error(error);
                alert("בדוק את הקונסול לשגיאה המפורטת");
                statusContainer.classList.add('hidden');
            } finally {
                searchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
