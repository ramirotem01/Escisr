<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Room Finder | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Heebo', sans-serif; text-align: right; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .room-image { height: 140px; width: 100%; object-fit: cover; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: bold; }
        .badge-scary { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-tech { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-kids { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic tracking-tighter">EscapeRooms AI</h1>
            <p class="text-slate-400 mt-2">חיפוש חכם מבוסס בינה מלאכותית</p>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-8 shadow-2xl">
            <textarea id="user-input" placeholder="תאר את החדר שאתה מחפש..." 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 h-32 resize-none transition-all text-lg"></textarea>
            
            <button id="search-btn" onclick="handleAISearch()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                <span>✨ מצא לי חדר</span>
            </button>
        </div>

        <div id="status-container" class="hidden flex flex-col items-center gap-4 mb-8">
            <div class="loader"></div>
            <p id="status-text" class="text-blue-400 font-bold animate-pulse text-sm"></p>
        </div>

        <div id="results-container" class="grid gap-6"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchApiKey() {
            const doc = await db.collection("system_config").doc("geimini_settings").get();
            if (doc.exists) return doc.data().apiKey;
            throw new Error("API Key missing");
        }

        async function getAvailableModel(apiKey) {
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await resp.json();
                const model = data.models.find(m => m.supportedGenerationMethods.includes("generateContent"));
                return model ? model.name : "models/gemini-1.5-flash";
            } catch (e) { return "models/gemini-1.5-flash"; }
        }

        function truncateWords(text, limit) {
            if (!text) return "";
            const words = text.split(/\s+/);
            return words.length <= limit ? text : words.slice(0, limit).join(" ") + "...";
        }

        async function handleAISearch() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return;

            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const resultsContainer = document.getElementById('results-container');
            const searchBtn = document.getElementById('search-btn');

            resultsContainer.innerHTML = '';
            statusContainer.classList.remove('hidden');
            searchBtn.disabled = true;

            try {
                statusText.innerText = "מתחבר ל AI זה יכול לקחת דקה...";
                const apiKey = await fetchApiKey();
                const modelName = await getAvailableModel(apiKey);

                const snapshot = await db.collection("rooms").where("isClosed", "==", false).get();
                const roomsData = [];
                snapshot.forEach(doc => roomsData.push({ id: doc.id, ...doc.data() }));

                const roomsForAI = roomsData.map(r => ({
                    id: r.id, name: r.name, description: r.description || "",
                    kidFriendly: r.kidFriendly || false, location: r.location || "",
                    rating: r.rating || 0, scaryLevel: r.scaryLevel || 0, techLevel: r.techLevel || 0
                }));

                const prompt = `אתה מומחה לחדרי בריחה. המשתמש מחפש: "${input}". 
                נתח את רשימת החדרים הזו: ${JSON.stringify(roomsForAI)}. 
                תחזיר אך ורק מערך JSON של 3 ה-IDs המתאימים ביותר: ["id1", "id2", "id3"]. בלי הסברים נוספים!`;

                const url = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error.message);

                let aiText = data.candidates[0].content.parts[0].text;
                
                // --- מנגנון ניקוי JSON משופר ---
                const jsonMatch = aiText.match(/\[.*\]/s); // מחפש כל מה שבין סוגריים מרובעים
                if (!jsonMatch) throw new Error("ה-AI לא החזיר פורמט תקין");
                const recommendedIds = JSON.parse(jsonMatch[0]);

                statusContainer.classList.add('hidden');
                
                recommendedIds.forEach(id => {
                    const room = roomsData.find(r => r.id === id);
                    if (room) {
                        resultsContainer.innerHTML += `
                            <div class="glass overflow-hidden rounded-[2rem] border-r-4 border-blue-500 animate-fadeIn cursor-pointer" 
                                 onclick="window.location.href='room.html?id=${room.id}'">
                                ${room.image ? `<img src="${room.image}" class="room-image">` : `<div class="room-image bg-slate-800 flex items-center justify-center">אין תמונה</div>`}
                                <div class="p-5">
                                    <div class="flex justify-between mb-2">
                                        <h3 class="text-lg font-bold">${room.name}</h3>
                                        <span class="text-yellow-400 font-bold text-sm">⭐ ${Number(room.rating).toFixed(1)}</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2 mb-3">
                                        ${room.kidFriendly ? '<span class="badge badge-kids">ילדים</span>' : ''}
                                        <span class="badge badge-scary">פחד: ${room.scaryLevel}</span>
                                        <span class="badge badge-tech">טכנולוגיה: ${room.techLevel}</span>
                                    </div>
                                    <p class="text-slate-400 text-xs mb-2">${truncateWords(room.description, 20)}</p>
                                    <p class="text-blue-400 text-[10px]">📍 ${room.location}</p>
                                </div>
                            </div>`;
                    }
                });

            } catch (error) {
                console.error(error);
                alert("שגיאה בעיבוד הנתונים. נסה שוב.");
                statusContainer.classList.add('hidden');
            } finally {
                searchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
