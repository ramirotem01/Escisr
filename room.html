<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרטי חדר | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-gradient { background: linear-gradient(to top, #0f172a 0%, transparent 100%); }
    </style>
</head>
<body class="pb-24">

    <div class="relative h-72 w-full overflow-hidden">
        <img id="room-image" src="" class="w-full h-full object-cover" alt="חדר בריחה">
        <div class="absolute inset-0 hero-gradient"></div>
        <button onclick="history.back()" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full text-white z-20">
            ✕ חזרה
        </button>
    </div>

    <main class="max-w-4xl mx-auto px-6 -mt-16 relative z-10">
        
        <div class="glass p-6 rounded-2xl shadow-2xl mb-6">
            <div class="flex justify-between items-start">
                <div>
                    <h1 id="room-name" class="text-3xl font-bold text-white mb-2 italic tracking-tight text-blue-400">טוען...</h1>
                    <p id="room-location" class="text-slate-400 text-sm flex items-center gap-1">📍 מיקום טוען...</p>
                </div>
                <div class="text-center bg-blue-600/20 p-2 rounded-xl border border-blue-500/30">
                    <div id="room-rating" class="text-2xl font-bold text-yellow-500">0.0</div>
                    <div class="text-[8px] text-slate-400 uppercase">ציון קהל</div>
                </div>
            </div>
            
            <div id="tags-container" class="mt-4 flex flex-wrap gap-2">
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-sm font-semibold mb-4 text-slate-400 uppercase tracking-widest">ניתוח חוויה</h2>
                <div class="w-full h-64">
                    <canvas id="roomChart"></canvas>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl flex flex-col justify-between">
                <div>
                    <h2 class="text-sm font-semibold mb-4 text-slate-400 uppercase tracking-widest">פרטים טכניים</h2>
                    <ul class="space-y-4 text-slate-300">
                        <li class="flex justify-between border-b border-slate-800 pb-2">
                            <span>זמן משחק:</span>
                            <span class="text-white font-medium">60 דקות</span>
                        </li>
                        <li class="flex justify-between border-b border-slate-800 pb-2">
                            <span>משתתפים:</span>
                            <span id="room-players" class="text-white font-medium">2-6</span>
                        </li>
                        <li class="flex justify-between border-b border-slate-800 pb-2">
                            <span>רמת קושי:</span>
                            <span id="room-difficulty" class="text-white font-medium">בינוני</span>
                        </li>
                    </ul>
                </div>

                <a id="booking-btn" href="#" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/30 transition-all mt-6">
                    הזמן מקום עכשיו
                </a>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">ראשי</span>
        </a>
        <a href="compare.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px]">השוואה</span>
        </a>
        <a href="add-review.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">✍️</span>
            <span class="text-[10px]">דרג חדר</span>
        </a>
        <a href="passport.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-400 transition">
            <span class="text-xl">🛂</span>
            <span class="text-[10px]">הדרכון</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');

        async function fetchRoomDetails() {
            if (!roomId) {
                document.body.innerHTML = "<div class='p-10 text-center'>שגיאה: לא נבחר חדר. <a href='index.html' class='text-blue-400'>חזרה לבית</a></div>";
                return;
            }

            const docRef = doc(db, "rooms", roomId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const room = docSnap.data();
                
                // עדכון UI
                document.getElementById('room-name').innerText = room.name;
                document.getElementById('room-location').innerText = `📍 ${room.location}`;
                document.getElementById('room-rating').innerText = room.rating.toFixed(1);
                document.getElementById('room-image').src = room.image || 'https://via.placeholder.com/800x400';
                
                // תגיות
                const tags = document.getElementById('tags-container');
                if (room.kidFriendly) tags.innerHTML += '<span class="px-3 py-1 bg-green-900/30 text-green-400 border border-green-800 rounded-full text-[10px]">👶 מתאים לילדים</span>';
                if (room.scaryLevel >= 7) tags.innerHTML += '<span class="px-3 py-1 bg-red-900/30 text-red-400 border border-red-800 rounded-full text-[10px]">🔥 מפחיד</span>';
                if (room.techLevel >= 7) tags.innerHTML += '<span class="px-3 py-1 bg-purple-900/30 text-purple-400 border border-purple-800 rounded-full text-[10px]">🤖 טכנולוגי</span>';

                initChart(room);
            } else {
                alert("החדר לא נמצא במערכת");
            }
        }

        function initChart(room) {
            const ctx = document.getElementById('roomChart');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['פחד', 'טכנולוגיה', 'קושי', 'עיצוב', 'סיפור'],
                    datasets: [{
                        label: 'דירוג חדר',
                        data: [
                            room.scaryLevel, 
                            room.techLevel, 
                            room.difficulty || 5, 
                            room.design || 5, 
                            room.story || 5
                        ],
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#94a3b8', font: { size: 10 } },
                            ticks: { display: false, max: 10, min: 0 },
                            suggestedMin: 0,
                            suggestedMax: 10
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        fetchRoomDetails();
    </script>
</body>
</html>
