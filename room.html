<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרטי חדר בריחה | EscapeRooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-10">

    <div class="relative h-64 md:h-96 w-full overflow-hidden">
        <img id="room-image" src="" class="w-full h-full object-cover" alt="חדר בריחה">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] to-transparent"></div>
        <button onclick="history.back()" class="absolute top-4 right-4 bg-slate-900/80 p-2 rounded-full text-white">
            ✕ חזרה
        </button>
    </div>

    <main class="max-w-4xl mx-auto px-6 -mt-20 relative z-10">
        
        <div class="glass p-6 rounded-2xl shadow-2xl mb-6">
            <div class="flex justify-between items-start">
                <div>
                    <h1 id="room-name" class="text-3xl font-bold text-white mb-2 italic">טוען שם חדר...</h1>
                    <p id="room-location" class="text-blue-400 flex items-center gap-1">📍 טוען מיקום...</p>
                </div>
                <div class="text-center">
                    <div id="room-rating" class="text-3xl font-bold text-yellow-500">0.0</div>
                    <div class="text-[10px] text-slate-400 uppercase">דירוג קהל</div>
                </div>
            </div>
            
            <div class="mt-6 flex gap-4 overflow-x-auto pb-2">
                <span id="tag-kids" class="hidden px-3 py-1 bg-green-900/30 text-green-400 border border-green-800 rounded-full text-xs">👶 מתאים לילדים</span>
                <span id="tag-tech" class="hidden px-3 py-1 bg-purple-900/30 text-purple-400 border border-purple-800 rounded-full text-xs">🤖 טכנולוגי מאוד</span>
                <span id="tag-scary" class="hidden px-3 py-1 bg-red-900/30 text-red-400 border border-red-800 rounded-full text-xs">🔥 מפחיד</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="glass p-6 rounded-2xl flex flex-col items-center">
                <h2 class="text-lg font-semibold mb-4 text-slate-300">ניתוח חוויה</h2>
                <div class="w-full h-64">
                    <canvas id="roomChart"></canvas>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl flex flex-col justify-between">
                <div>
                    <h2 class="text-lg font-semibold mb-4 text-slate-300">מידע נוסף</h2>
                    <ul class="space-y-4 text-slate-300">
                        <li class="flex justify-between border-b border-slate-700 pb-2">
                            <span>זמן משחק:</span>
                            <span class="text-white font-medium">60 דקות</span>
                        </li>
                        <li class="flex justify-between border-b border-slate-700 pb-2">
                            <span>כמות משתתפים:</span>
                            <span class="text-white font-medium">2-6 שחקנים</span>
                        </li>
                        <li class="flex justify-between border-b border-slate-700 pb-2">
                            <span>רמת קושי:</span>
                            <span id="difficulty-text" class="text-white font-medium">בינוני</span>
                        </li>
                    </ul>
                </div>

                <a id="booking-btn" href="#" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/20 transition-all mt-6">
                    הזמנת חדר עכשיו
                </a>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB32VRQKljRUOPeiftIAQTGtoF-qthI-h4",
            authDomain: "escisr.firebaseapp.com",
            projectId: "escisr",
            storageBucket: "escisr.firebasestorage.app",
            messagingSenderId: "907984583225",
            appId: "1:907984583225:web:66777e44fb162f68c3abe8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // שליפת ה-ID מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');

        async function fetchRoomDetails() {
            if (!roomId) {
                alert("לא נבחר חדר!");
                return;
            }

            const docRef = doc(db, "rooms", roomId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const room = docSnap.data();
                
                // עדכון טקסטים
                document.getElementById('room-name').innerText = room.name;
                document.getElementById('room-location').innerText = `📍 ${room.location}`;
                document.getElementById('room-rating').innerText = room.rating.toFixed(1);
                document.getElementById('room-image').src = room.image || 'https://via.placeholder.com/800x400';
                
                // הצגת תגיות
                if (room.kidFriendly) document.getElementById('tag-kids').classList.remove('hidden');
                if (room.techLevel >= 8) document.getElementById('tag-tech').classList.remove('hidden');
                if (room.scaryLevel >= 7) document.getElementById('tag-scary').classList.remove('hidden');

                // יצירת הגרף
                initChart(room);
            } else {
                console.log("No such document!");
            }
        }

        function initChart(room) {
            const ctx = document.getElementById('roomChart');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['פחד', 'טכנולוגיה', 'קושי', 'תפאורה', 'סיפור'],
                    datasets: [{
                        label: 'נתוני חדר',
                        data: [
                            room.scaryLevel, 
                            room.techLevel, 
                            room.difficulty || 5, 
                            room.design || 8, 
                            room.story || 7
                        ],
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: 'rgb(59, 130, 246)',
                        pointBackgroundColor: 'rgb(59, 130, 246)',
                        pointBorderColor: '#fff'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#94a3b8', font: { size: 12 } },
                            ticks: { display: false, max: 10, min: 0, stepSize: 2 },
                            suggestedMin: 0,
                            suggestedMax: 10
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        fetchRoomDetails();
    </script>
</body>
</html>
